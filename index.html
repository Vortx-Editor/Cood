<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Master Your Motion</title>
    <style>
        /* إعدادات أساسية لضبط الشاشة بالكامل */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #0b0c10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center; /* يوسط الموقع في البي سي */
            align-items: center;
            overflow-x: hidden;
        }

        /* الحاوية الرئيسية (هنا السحر اللي يمنع الخراب في البي سي) */
        .container {
            width: 90%;
            max-width: 420px; /* هذا الرقم يثبت عرض الموقع مهما كبرت الشاشة */
            position: relative; /* يحبس الأيقونات الطايرة داخل الصندوق */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        /* الشعار والنص */
        .logo-text {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #7028e4, 0 0 20px #e5b2ca;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #c5c6c7;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        /* الأزرار الزجاجية */
        .link-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            text-decoration: none;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-sizing: border-box;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* زر المتجر المميز */
        .store-btn {
            background: linear-gradient(45deg, #7028e4, #e5b2ca);
            border: none;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 0 15px rgba(112, 40, 228, 0.4);
        }
        .store-btn:hover {
            background: linear-gradient(45deg, #8a3ffc, #ffcce0);
            box-shadow: 0 0 20px rgba(112, 40, 228, 0.6);
        }

        /* العداد */
        .visitor-counter {
            margin-top: 20px;
            padding: 8px 20px;
            font-size: 0.9rem;
            color: #aaa;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* الأيقونات الطايرة (مربوطة بالصندوق الحين) */
        .floating-icon {
            position: absolute;
            width: 45px;
            height: 45px;
            background: rgba(0, 255, 0, 0.15); /* لون أفتر افكتس */
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
            animation: float 3s ease-in-out infinite;
            z-index: 0;
        }

        /* تحديد أماكن الأيقونات */
        .icon-ae { top: 15%; left: -60px; } /* يسار الصندوق */
        .icon-pr { bottom: 25%; right: -60px; background: rgba(200, 0, 255, 0.15); color: #e100ff; box-shadow: 0 0 10px rgba(225, 0, 255, 0.2); } /* يمين الصندوق */

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* إخفاء الأيقونات في الجوال إذا الشاشة صغيرة جداً عشان ما تخرب الشكل */
        @media (max-width: 500px) {
            .floating-icon {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="floating-icon icon-ae">Ae</div>
        <div class="floating-icon icon-pr">Pr</div>

        <div class="logo-text">VORTX</div>
        <div class="subtitle">MASTER YOUR MOTION</div>

        <a href="#" class="link-btn store-btn">🛒 Online Store</a>
        <a href="#" class="link-btn">🎵 TikTok</a>
        <a href="#" class="link-btn">✈️ Telegram</a>
        <a href="#" class="link-btn">📸 Instagram</a>

        <div class="visitor-counter" id="visitors-count">👁️ Visitors: ...</div>
    </div>

    <script>
        const counterElement = document.getElementById('visitors-count');
        
        // جلب الزيارات من السيرفر السحابي
        fetch('https://api.counterapi.dev/v1/vortx-brand/visits')
            .then(response => response.json())
            .then(data => {
                if(data.count) {
                    counterElement.innerText = `👁️ Visitors: ${data.count}`;
                } else {
                    counterElement.innerText = `👁️ Visitors: 🟢`;
                }
            })
            .catch(error => {
                counterElement.innerText = "👁️ Visitors: 🟢"; 
            });
    </script>

</body>
</html>
