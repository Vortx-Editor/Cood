<style>
    /* 1. Cursor Glow - Optimized for Desktop */
    @media (min-width: 1024px) {
        body { cursor: none; }
        .cursor-glow {
            position: fixed;
            width: 15px; height: 15px;
            border-radius: 50%;
            background: #b400ff;
            box-shadow: 0 0 20px #b400ff, 0 0 40px #7a00ff, 0 0 60px #b400ff;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
            transition: transform 0.08s ease-out;
        }
    }

    /* 2. Lightning/Energy Flash Overlay */
    .lightning-effect {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(180, 0, 255, 0.12);
        opacity: 0;
        pointer-events: none;
        z-index: 9998;
        transition: opacity 0.1s ease-out;
    }

    /* 3. Logo Glitch Animation */
    .glitch-vfx {
        animation: glitch-anim 4s infinite;
        display: inline-block;
    }
    @keyframes glitch-anim {
        0% { filter: none; transform: translate(0); }
        92% { filter: none; transform: translate(0); }
        94% { filter: brightness(1.8) hue-rotate(45deg); transform: translate(2px, -1px); }
        96% { filter: contrast(2) saturate(1.5); transform: translate(-2px, 1px); }
        98% { filter: brightness(1.2) sepia(0.5); transform: translate(1px, 0); }
        100% { filter: none; transform: translate(0); }
    }

    /* 4. Button Pulse & Hover Stability */
    .link-btn, .store-btn {
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease !important;
    }
    .link-btn:hover, .store-btn:hover {
        transform: scale(1.05) translateY(-2px) !important;
        box-shadow: 0 0 20px #b400ff, 0 0 40px rgba(122, 0, 255, 0.6) !important;
    }

    /* 5. Parallax Wrapper Stability */
    body {
        transition: transform 0.1s ease-out;
        transform-origin: center;
    }
</style>

<script>
    // --- 1. Initialize VFX Elements ---
    const flashLayer = document.createElement("div");
    flashLayer.className = "lightning-effect";
    document.body.appendChild(flashLayer);

    // --- 2. Cursor Glow Logic (Desktop Only) ---
    if (window.innerWidth > 1024) {
        const cursor = document.createElement("div");
        cursor.className = "cursor-glow";
        document.body.appendChild(cursor);

        document.addEventListener("mousemove", (e) => {
            cursor.style.left = e.clientX + "px";
            cursor.style.top = e.clientY + "px";
        });
    }

    // --- 3. Lightning Energy Click Effect ---
    document.addEventListener("click", (e) => {
        // Trigger only on buttons/links or general background
        flashLayer.style.opacity = "1";
        setTimeout(() => { flashLayer.style.opacity = "0"; }, 100);
    });

    // --- 4. Background Parallax (Subtle) ---
    document.addEventListener("mousemove", (e) => {
        const moveX = (window.innerWidth / 2 - e.clientX) / 60;
        const moveY = (window.innerHeight / 2 - e.clientY) / 60;
        // Applying to a wrapper is safer, but here we follow your body request
        document.body.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });

    // --- 5. Random Subtle Energy Flashes (8s Interval) ---
    setInterval(() => {
        flashLayer.style.opacity = "0.08";
        setTimeout(() => { flashLayer.style.opacity = "0"; }, 150);
    }, 8000);

    // --- 6. Apply Glitch Class Automatically ---
    // This looks for your VORTX logo image and applies the glitch
    window.onload = () => {
        const logo = document.querySelector('.title-img') || document.querySelector('.vortx-title');
        if(logo) logo.classList.add('glitch-vfx');
    };
</script>
