<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Pro Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-cyan: #00f3ff;
            --bg-dark: #040008;
            --robot-color: #9d00ff;
            --robot-red: #ff003c;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            padding: 80px 20px 40px; 
            color: #fff;
            overflow-x: hidden; 
            font-family: 'Tajawal', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            will-change: transform;
            transform: translateZ(0);
        }

        /* --- تأثيرات الخلفية الزاخرة --- */
        #rainCanvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
            opacity: 0.7;
        }

        .lightning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(157, 0, 255, 0.12); opacity: 0;
            pointer-events: none; z-index: 9998; transition: opacity 0.1s;
        }

        /* --- أيقونات البرامج الطايرة الجانبية --- */
        .bg-icon {
            position: fixed; z-index: 5; width: 110px; pointer-events: none; opacity: 0.4; 
            filter: drop-shadow(0 0 20px var(--neon-purple));
        }
        .bg-ae { 
            top: 15%; right: 8%; 
            animation: float-ae 6s infinite ease-in-out;
        }
        .bg-am { 
            bottom: 15%; left: 8%; 
            animation: float-am 7s infinite ease-in-out;
        }
        
        @keyframes float-ae { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(8deg); } }
        @keyframes float-am { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(20px) rotate(-8deg); } }

        /* --- الحاوية الكبرى الزجاجية الفخمة --- */
        .container {
            background: linear-gradient(135deg, rgba(8, 2, 16, 0.7) 0%, rgba(18, 2, 32, 0.5) 100%);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(157, 0, 255, 0.25); 
            border-radius: 28px; 
            padding: 45px 30px;
            width: 100%; 
            max-width: 430px; 
            text-align: center;
            position: relative; 
            z-index: 100;
            box-shadow: 0 0 40px rgba(157, 0, 255, 0.2), inset 0 0 15px rgba(255, 255, 255, 0.02);
            animation: containerReveal 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes containerReveal { from { opacity: 0; transform: scale(0.93); } to { opacity: 1; transform: scale(1); } }

        /* قماش الخطوط المتحركة بالداخل */
        #innerBouncingCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
            border-radius: 28px;
        }

        .content-block { position: relative; z-index: 10; }

        /* --- الهوية والشعار --- */
        .logo-container {
            width: 130px; height: 130px; margin: 0 auto 18px; border-radius: 50%; padding: 4px;
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple)); 
            box-shadow: 0 0 25px var(--neon-purple);
        }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #040008; }

        .title-container { margin-bottom: 10px; }
        .title-img { width: 80%; max-width: 240px; display: block; margin: 0 auto; filter: drop-shadow(0 0 20px rgba(157, 0, 255, 0.8)); }
        .glitch { animation: glitch 4s infinite; } 
        @keyframes glitch { 0%, 90%, 100% { transform: translate(0); } 93% { transform: translate(3px, -2px); } 95% { transform: translate(-3px, 2px); } }

        .crystal-panel {
            margin-bottom: 30px; padding: 8px 20px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(157, 0, 255, 0.15); border-radius: 30px; display: inline-block;
        }
        .crystal-text {
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #a2a7ab 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- الأزرار والتطبيقات المنسقة --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }
        
        .link-btn {
            display: flex; align-items: center; justify-content: flex-start;
            text-decoration: none; color: #fff; background: rgba(0, 0, 0, 0.4);
            padding: 16px 24px; border-radius: 16px; font-size: 17px; font-weight: 800;
            border: 1px solid rgba(157, 0, 255, 0.2); transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .link-btn:hover { 
            transform: scale(1.04) translateY(-2px); 
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.4);
        }

        .store-btn { 
            background: linear-gradient(90deg, #4a00e0, #8e2de2); 
            border: none; 
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.3);
            justify-content: center;
        }
        .store-btn:hover { box-shadow: 0 0 25px var(--neon-purple); }

        /* ضبط حجم أيقونات السوشيال ميديا بالملي وتوهجها */
        .btn-icon { width: 32px; height: 32px; margin-right: 15px; object-fit: contain; pointer-events: none; }
        
        .glow-tiktok { filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8)); }
        .glow-telegram { filter: drop-shadow(0 0 8px var(--neon-cyan)); }
        .glow-instagram { filter: drop-shadow(0 0 8px #ff007f); }

        .btn-blue-reaction { 
            background: rgba(0, 243, 255, 0.15) !important; 
            box-shadow: 0 0 25px var(--neon-cyan) !important; 
            border-color: var(--neon-cyan) !important;
        }

        /* صندوق نسخ الرابط المطور */
        .copy-box {
            background: rgba(0, 0, 0, 0.4); border: 1px dashed rgba(0, 243, 255, 0.3); border-radius: 12px;
            padding: 14px 20px; margin-top: -5px; display: flex; justify-content: space-between; align-items: center;
            font-size: 15px; font-weight: 700; color: rgba(255, 255, 255, 0.6); cursor: pointer; transition: all 0.2s;
        }
        .copy-box:hover { background: rgba(0, 243, 255, 0.08); color: var(--neon-cyan); border-color: var(--neon-cyan); }

        /* عداد ممر الزوار الفخم */
        .visitor-badge-container { margin-top: 35px; display: flex; justify-content: center; }
        .visitor-badge { 
            display: inline-flex; align-items: center; padding: 10px 22px; font-size: 14px; 
            color: rgba(255, 255, 255, 0.8); background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(157, 0, 255, 0.2); border-radius: 20px; 
        }
        .visitor-badge span { color: #d866ff; font-weight: 900; margin-left: 6px; text-shadow: 0 0 8px rgba(216, 102, 255, 0.8); }

        /* --- الروبوت السيبراني الذكي التفاعلي --- */
        .robot-wrapper { 
            position: absolute; top: -75px; left: calc(50% - 22.5px); 
            width: 45px; height: 45px; z-index: 199; touch-action: none; cursor: grab; opacity: 0; 
        }
        .robot-wrapper:active { cursor: grabbing; }
        .robot-mesh { position: relative; width: 100%; height: 100%; animation: robotIdle 2.5s ease-in-out infinite; }
        .robot-body { width: 100%; height: 80%; background: linear-gradient(135deg, #2b004a, var(--robot-color)); border-radius: 10px; position: relative; box-shadow: 0 0 15px var(--robot-color); border: 1px solid rgba(255, 255, 255, 0.3); transition: background 0.3s; }
        .eyes-container { display: flex; justify-content: space-between; width: 22px; position: absolute; top: 30%; left: 50%; transform: translateX(-50%); }
        .robot-eye { width: 5px; height: 5px; background: var(--neon-cyan); border-radius: 50%; box-shadow: 0 0 8px var(--neon-cyan); animation: blink 4s infinite; }
        .robot-propeller { width: 28px; height: 4px; background: rgba(255, 255, 255, 0.8); position: absolute; top: -5px; left: 50%; transform: translateX(-50%); animation: spinBlade 0.1s linear infinite; }
        
        /* خط الليزر الموجه بدقة */
        .light-beam { 
            position: absolute; top: 40%; left: 22px; height: 4px; 
            background: linear-gradient(to right, var(--neon-cyan), transparent); 
            transform-origin: left center; opacity: 0; pointer-events: none; transition: opacity 0.2s; 
            z-index: 50;
        }

        @keyframes robotIdle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes spinBlade { 0% { transform: translateX(-50%) rotateY(0deg); } 100% { transform: translateX(-50%) rotateY(360deg); } }
        @keyframes blink { 0%, 96%, 98% { transform: scaleY(1); } 97% { transform: scaleY(0.1); } }
        
        /* حركات الروبوت التفاعلية عند اللمس والضرب */
        .robot-spin { animation: quickSpin 0.5s ease-out !important; }
        @keyframes quickSpin { 0% { transform: rotate(0deg) scale(1.2); } 100% { transform: rotate(360deg) scale(1); } }
        .robot-shake { animation: shakeDust 0.5s ease-in-out !important; }
        @keyframes shakeDust { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        .robot-red-theme .robot-body { background: linear-gradient(135deg, #5a0000, var(--robot-red)) !important; box-shadow: 0 0 20px var(--robot-red) !important; }
        .robot-red-theme .robot-eye { background: #fff !important; box-shadow: 0 0 8px #fff !important; }

        @media (min-width: 768px) {
            .bg-ae { right: calc(50% - 340px) !important; }
            .bg-am { left: calc(50% - 340px) !important; }
        }
    </style>
</head>
<body>

    <canvas id="rainCanvas"></canvas>
    <div class="lightning" id="flash"></div>

    <img src="ae.png" alt="AE" class="bg-icon bg-ae">
    <img src="am.png" alt="AM" class="bg-icon bg-am">

    <div class="container" id="mainContainer">
        
        <div id="cyber-robot" class="robot-wrapper">
            <div class="robot-mesh">
                <div class="robot-body">
                    <div class="eyes-container"><div class="robot-eye"></div><div class="robot-eye"></div></div>
                </div>
                <div class="robot-propeller"></div>
                <div id="robot-laser" class="light-beam"></div>
            </div>
        </div>

        <canvas id="innerBouncingCanvas"></canvas>

        <div class="content-block">
            <div class="logo-container"><img src="lg.png" alt="Avatar" class="logo"></div>
            
            <div class="title-container">
                <img src="vr.png" alt="VORTX" class="title-img glitch">
            </div>
            
            <div class="crystal-panel"><span class="crystal-text">Master Your Motion</span></div>

            <div class="links-wrapper">
                <a href="store.html" class="link-btn store-btn">🛒 Online Store</a>
                
                <a href="https://www.tiktok.com/@ortr.1?_r=1&_t=ZS-94WfLhF9TMt" target="_blank" class="link-btn">
                    <img src="tik.png" alt="TikTok" class="btn-icon glow-tiktok"> TikTok
                </a>
                
                <a href="https://t.me/v_ortx" target="_blank" class="link-btn" id="telegram-btn">
                    <img src="tly.png" alt="Telegram" class="btn-icon glow-telegram"> Telegram
                </a>
                
                <div class="copy-box" onclick="copyTelegramLink()" id="copyBox">
                    <span style="flex: 1; text-align: center; margin-left: 20px;">https://t.me/v_ortx</span>
                    <span>📋</span>
                </div>

                <a href="https://www.instagram.com/toix.8i?igsh=Z3B1eWdwNGJocW9q" target="_blank" class="link-btn">
                    <img src="ins.png" alt="Instagram" class="btn-icon glow-instagram"> Instagram
                </a>
            </div>

            <div class="visitor-badge-container">
                <div class="visitor-badge">👁 Visitors: <span id="vCount">0</span></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault()); 

        window.addEventListener('load', () => {
            setTimeout(() => {
                // 1. تأثير مطر النيون الخلفي الأساسي
                const rainCanvas = document.getElementById('rainCanvas');
                const ctxRain = rainCanvas.getContext('2d');
                function resizeRain() { rainCanvas.width = window.innerWidth; rainCanvas.height = window.innerHeight; }
                resizeRain();
                const rainParticles = [];
                for (let i = 0; i < 45; i++) { 
                    rainParticles.push({ x: Math.random() * rainCanvas.width, y: Math.random() * rainCanvas.height, size: Math.random() * 2 + 0.5, speedY: Math.random() * 0.6 + 0.2, opacity: Math.random() * 0.4 + 0.1 });
                }
                function animateRain() {
                    ctxRain.clearRect(0, 0, rainCanvas.width, rainCanvas.height); 
                    rainParticles.forEach(p => {
                        ctxRain.fillStyle = `rgba(157, 0, 255, ${p.opacity})`; ctxRain.beginPath(); ctxRain.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctxRain.fill();
                        p.y += p.speedY; if (p.y > rainCanvas.height) { p.y = 0; p.x = Math.random() * rainCanvas.width; }
                    }); requestAnimationFrame(animateRain);
                } animateRain();

                // 2. خطوط الشبكة العنكبوتية المتحركة داخل الصندوق الزجاجي (الشيء الواجد اللي تحبه)
                const innerCanvas = document.getElementById('innerBouncingCanvas');
                const ctxInner = innerCanvas.getContext('2d');
                const container = document.getElementById('mainContainer');
                let innerW, innerH;
                function resizeInnerCanvas() { innerW = container.offsetWidth; innerH = container.offsetHeight; innerCanvas.width = innerW; innerCanvas.height = innerH; }
                resizeInnerCanvas();
                const linesParticles = [];
                for(let i=0; i<18; i++) { linesParticles.push({ x: Math.random() * 300 + 20, y: Math.random() * 400 + 20, vx: (Math.random() - 0.5) * 1.2, vy: (Math.random() - 0.5) * 1.2 }); }
                function animateInnerLines() {
                    ctxInner.clearRect(0, 0, innerW, innerH);
                    for(let i=0; i<linesParticles.length; i++) {
                        let p = linesParticles[i]; p.x += p.vx; p.y += p.vy;
                        if(p.x <= 0 || p.x >= innerW) p.vx *= -1; if(p.y <= 0 || p.y >= innerH) p.vy *= -1;
                    }
                    ctxInner.lineWidth = 0.8;
                    for(let i=0; i<linesParticles.length; i++) {
                        for(let j=i+1; j<linesParticles.length; j++) {
                            let dx = linesParticles[i].x - linesParticles[j].x; let dy = linesParticles[i].y - linesParticles[j].y;
                            let dist = Math.sqrt(dx*dx + dy*dy);
                            if(dist < 75) { ctxInner.beginPath(); ctxInner.strokeStyle = `rgba(0, 243, 255, ${0.7 - dist/75})`; ctxInner.moveTo(linesParticles[i].x, linesParticles[i].y); ctxInner.lineTo(linesParticles[j].x, linesParticles[j].y); ctxInner.stroke(); }
                        }
                    } requestAnimationFrame(animateInnerLines);
                } animateInnerLines();
                window.addEventListener('resize', () => { resizeRain(); resizeInnerCanvas(); });

                // 3. عداد الزوار الأساسي من السيرفر
                const vCountElement = document.getElementById('vCount');
                const savedCount = localStorage.getItem('vortx_last_count') || "...";
                vCountElement.innerText = savedCount;
                fetch(`https://api.counterapi.dev/v1/vortx_official_page/total_visits/up`)
                  .then(res => res.json())
                  .then(data => { if(data && data.count) { const fn = data.count.toLocaleString(); vCountElement.innerText = fn; localStorage.setItem('vortx_last_count', fn); } })
                  .catch(() => console.log("Live counter offline."));

                // 4. تشغيل الروبوت واستهدافه لزر التيليجرام بليزر متقن
                const robot = document.getElementById('cyber-robot');
                const robotMesh = document.querySelector('.robot-mesh');
                const laser = document.getElementById('robot-laser');
                const telegramBtn = document.getElementById('telegram-btn');
                let isDragging = false; let xOffset = 0, yOffset = 0;

                robot.style.opacity = '1';
                setTimeout(() => {
                    if(!telegramBtn) return;
                    const targetRect = telegramBtn.getBoundingClientRect();
                    const containerRect = container.getBoundingClientRect();
                    
                    // حساب المسافة والزاوية من موقع الروبوت لزر التيليجرام بدقة رياضية
                    const dx = (targetRect.left + 30) - (containerRect.left + containerRect.width/2);
                    const dy = (targetRect.top - containerRect.top) + 95;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                    
                    laser.style.width = `${distance}px`; 
                    laser.style.transform = `rotate(${angle}deg)`;
                    laser.style.opacity = '1'; 
                    telegramBtn.classList.add('btn-blue-reaction');
                    
                    setTimeout(() => {
                        laser.style.opacity = '0'; 
                        telegramBtn.classList.remove('btn-blue-reaction');
                    }, 1800); 
                }, 1200);

                // 5. حركات تفاعلية عند لمس الروبوت من الجوال أو كليك
                let initialX, initialY;
                const startDrag = (e) => {
                    if(isDragging) return; e.stopPropagation(); 
                    robotMesh.classList.remove('robot-shake'); 
                    robotMesh.classList.add('robot-spin', 'robot-red-theme');
                    setTimeout(() => { robotMesh.classList.remove('robot-spin', 'robot-red-theme'); }, 500);
                    const pageX = e.touches ? e.touches[0].pageX : e.pageX;
                    const pageY = e.touches ? e.touches[0].pageY : e.pageY;
                    initialX = pageX - xOffset; initialY = pageY - yOffset;
                    robot.style.transition = 'none';
                };
                const moveDrag = (e) => {
                    if (e.type === 'touchmove') { isDragging = true; e.preventDefault(); }
                    const pageX = e.touches ? e.touches[0].pageX : e.pageX;
                    const pageY = e.touches ? e.touches[0].pageY : e.pageY;
                    xOffset = pageX - initialX; yOffset = pageY - initialY; 
                    robot.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
                };
                const endDrag = () => {
                    if(isDragging) { robotMesh.classList.add('robot-shake'); setTimeout(() => { robotMesh.classList.remove('robot-shake'); }, 500); isDragging = false; }
                };
                robot.addEventListener('touchstart', startDrag, {passive: false});
                robot.addEventListener('touchmove', moveDrag, {passive: false});
                robot.addEventListener('touchend', endDrag);
                robot.addEventListener('mousedown', startDrag);
                document.addEventListener('mousemove', (e) => { if(initialX !== undefined && !e.touches) moveDrag(e); });
                document.addEventListener('mouseup', () => { initialX = undefined; endDrag(); });

            }, 200); 
        });

        // 6. تأثير تحريك الشاشة ثلاثي الأبعاد مع الماوس (Parallax) لقوة الفخامة
        document.addEventListener("mousemove", e => {
            const x = (window.innerWidth / 2 - e.clientX) / 75; 
            const y = (window.innerHeight / 2 - e.clientY) / 75;
            document.body.style.transform = `translate(${x}px, ${y}px) translateZ(0)`;
        });

        // تأثير صاعقة البرق العشوائية عند الضغط على الفراغ
        const flash = document.getElementById('flash');
        document.addEventListener('click', (e) => {
            if (e.target.closest('#cyber-robot') || e.target.closest('.link-btn') || e.target.closest('.copy-box')) return;
            flash.style.opacity = '1'; setTimeout(() => { flash.style.opacity = '0'; }, 100);
        });

        // دالة نسخ الرابط المطور
        function copyTelegramLink() {
            const linkToCopy = "https://t.me/v_ortx";
            navigator.clipboard.writeText(linkToCopy).then(() => {
                const box = document.getElementById('copyBox');
                const originalHTML = box.innerHTML;
                box.innerHTML = '<span style="color: #00f3ff; font-weight: bold; width: 100%; text-align: center;">Copied! ✔️</span>';
                setTimeout(() => { box.innerHTML = originalHTML; }, 2000);
            }).catch(err => console.error('Failed to copy!', err));
        }
    </script>
</body>
</html>
