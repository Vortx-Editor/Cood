<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Pro Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-purple: #7a00ff;
            --glow-cyan: #00f3ff;
            --bg-gradient: linear-gradient(135deg, #05000a 0%, #0c011a 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(157, 0, 255, 0.2);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            padding: 40px 20px; 
            color: #fff;
            overflow-x: hidden; 
            font-family: 'Tajawal', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- خلفية المطر الفخمة --- */
        #rainCanvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
            opacity: 0.6;
        }

        .lightning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(122, 0, 255, 0.08); opacity: 0;
            pointer-events: none; z-index: 9998; transition: opacity 0.1s;
        }

        /* --- أيقونات البرامج الجانبية --- */
        .bg-icon {
            position: fixed; z-index: 5; width: 100px; pointer-events: none; opacity: 0.3; 
            filter: drop-shadow(0 0 20px var(--glow-purple));
            animation: float 6s infinite ease-in-out;
        }
        .bg-ae { top: 15%; right: 10%; }
        .bg-am { bottom: 15%; left: 10%; animation-delay: 3s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* --- الحاوية الرئيسية (Glassmorphism فخم) --- */
        .container {
            background: rgba(10, 3, 20, 0.6);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 40px 25px;
            width: 100%; 
            max-width: 420px; 
            text-align: center;
            position: relative; 
            z-index: 100;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(157, 0, 255, 0.1);
            animation: fadeIn Container 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* --- الشعار والهوية --- */
        .logo-container {
            width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 50%; padding: 3px;
            background: linear-gradient(to bottom, var(--glow-cyan), var(--glow-purple));
            box-shadow: 0 0 30px rgba(122, 0, 255, 0.5);
        }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #06000a; }

        .title-container { margin-bottom: 8px; }
        .title-img { width: 75%; max-width: 220px; display: block; margin: 0 auto; filter: drop-shadow(0 0 15px var(--glow-purple)); }

        .crystal-panel {
            margin-bottom: 30px; padding: 6px 16px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px; display: inline-block;
        }
        .crystal-text {
            font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(90deg, #fff, #9aa0a6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- الأزرار العصرية المنسقة --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 14px; }
        
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff; background: rgba(255, 255, 255, 0.02);
            padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 800;
            border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative; overflow: hidden;
        }
        
        .link-btn:hover { 
            transform: translateY(-2px); 
            background: rgba(122, 0, 255, 0.15);
            border-color: var(--glow-purple);
            box-shadow: 0 10px 25px rgba(122, 0, 255, 0.3);
        }

        /* تمييز المتجر الفخم */
        .store-btn { 
            background: linear-gradient(90deg, #5a00d0, #8000ff); 
            border: none;
            box-shadow: 0 8px 20px rgba(122, 0, 255, 0.4);
        }
        .store-btn:hover {
            background: linear-gradient(90deg, #6a00e0, #9000ff);
            box-shadow: 0 12px 28px rgba(122, 0, 255, 0.6);
        }

        .btn-icon { width: 26px; height: 26px; margin-right: 12px; object-fit: contain; }
        
        /* تأثير التفاعل الأزرق مع الروبوت بدون تكسير الشكل */
        .btn-blue-reaction { 
            background: rgba(0, 243, 255, 0.1) !important; 
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4) !important; 
            border-color: var(--glow-cyan) !important; 
        }

        /* --- صندوق النسخ المطور المدمج --- */
        .copy-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed rgba(0, 243, 255, 0.3);
            border-radius: 12px; padding: 12px 16px; margin-top: -6px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; font-family: 'Montserrat', sans-serif; color: rgba(255, 255, 255, 0.6); 
            cursor: pointer; transition: all 0.2s ease;
        }
        .copy-box:hover {
            background: rgba(0, 243, 255, 0.05);
            color: var(--glow-cyan);
            border-color: var(--glow-cyan);
        }

        /* --- العداد الزجاجي الراق ممر الزوار --- */
        .visitor-badge-container { margin-top: 30px; display: flex; justify-content: center; }
        .visitor-badge { 
            display: inline-flex; align-items: center; padding: 8px 20px; font-size: 13px; 
            color: rgba(255, 255, 255, 0.7); background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; 
        }
        .visitor-badge span { color: var(--glow-cyan); font-weight: 800; margin-left: 6px; text-shadow: 0 0 10px var(--glow-cyan); }

        /* --- الروبوت السيبراني الطاير --- */
        .robot-wrapper { position: absolute; top: -60px; left: calc(50% - 22.5px); width: 45px; height: 45px; z-index: 150; opacity: 0; transition: opacity 0.5s; }
        .robot-mesh { position: relative; width: 100%; height: 100%; animation: robotIdle 3s ease-in-out infinite; }
        .robot-body { width: 100%; height: 80%; background: linear-gradient(135deg, #15002a, var(--glow-purple)); border-radius: 10px; position: relative; box-shadow: 0 0 15px var(--glow-purple); border: 1px solid rgba(255, 255, 255, 0.2); }
        .eyes-container { display: flex; justify-content: space-between; width: 20px; position: absolute; top: 30%; left: 50%; transform: translateX(-50%); }
        .robot-eye { width: 5px; height: 5px; background: var(--glow-cyan); border-radius: 50%; box-shadow: 0 0 8px var(--glow-cyan); }
        .robot-propeller { width: 26px; height: 3px; background: #fff; position: absolute; top: -5px; left: 50%; transform: translateX(-50%); animation: spinBlade 0.1s linear infinite; }
        .light-beam { position: absolute; top: 50%; left: 22px; height: 15px; background: linear-gradient(to right, rgba(0, 243, 255, 0.6), transparent); transform-origin: left center; opacity: 0; transition: opacity 0.3s; z-index: -1; }
        
        @keyframes robotIdle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes spinBlade { 0% { transform: translateX(-50%) rotateY(0deg); } 100% { transform: translateX(-50%) rotateY(360deg); } }

        @media (min-width: 768px) {
            .bg-icon { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <canvas id="rainCanvas"></canvas>
    <div class="lightning" id="flash"></div>

    <img src="ae.png" alt="AE" class="bg-icon bg-ae">
    <img src="am.png" alt="AM" class="bg-icon bg-am">

    <div class="container" id="mainContainer">
        
        <div id="cyber-robot" class="robot-wrapper">
            <div class="robot-mesh">
                <div class="robot-body">
                    <div class="eyes-container"><div class="robot-eye"></div><div class="robot-eye"></div></div>
                </div>
                <div class="robot-propeller"></div>
                <div id="robot-laser" class="light-beam"></div>
            </div>
        </div>

        <div class="logo-container"><img src="lg.png" alt="Avatar" class="logo"></div>
        <div class="title-container"><img src="vr.png" alt="VORTX" class="title-img"></div>
        <div class="crystal-panel"><span class="crystal-text">Master Your Motion</span></div>

        <div class="links-wrapper">
            <a href="store.html" class="link-btn store-btn">🛒 Online Store</a>
            
            <a href="https://www.tiktok.com/@ortr.1?_r=1&_t=ZS-94WfLhF9TMt" target="_blank" class="link-btn">
                <img src="tik.png" alt="TikTok" class="btn-icon"> TikTok
            </a>
            
            <a href="https://t.me/v_ortx" target="_blank" class="link-btn" id="telegram-btn">
                <img src="tly.png" alt="Telegram" class="btn-icon"> Telegram
            </a>
            
            <div class="copy-box" onclick="copyTelegramLink()" id="copyBox">
                <span>https://t.me/v_ortx</span>
                <span>📋</span>
            </div>

            <a href="https://www.instagram.com/toix.8i?igsh=Z3B1eWdwNGJocW9q" target="_blank" class="link-btn">
                <img src="ins.png" alt="Instagram" class="btn-icon"> Instagram
            </a>
        </div>

        <div class="visitor-badge-container">
            <div class="visitor-badge">👁 Visitors: <span id="vCount">...</span></div>
        </div>
    </div>

    <script>
        // منع القائمة المنسدلة كليك يمين للمظهر الاحترافي
        document.addEventListener('contextmenu', e => e.preventDefault()); 

        window.addEventListener('load', () => {
            // تأثير المطر الخفيف المطور بالـ Canvas
            const canvas = document.getElementById('rainCanvas');
            const ctx = canvas.getContext('2d');
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize(); window.addEventListener('resize', resize);

            const drops = [];
            for(let i = 0; i < 45; i++) {
                drops.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, len: Math.random()*12+4, speed: Math.random()*3+2 });
            }

            function drawRain() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = 'rgba(122, 0, 255, 0.25)';
                ctx.lineWidth = 1.5;
                drops.forEach(d => {
                    ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y + d.len); ctx.stroke();
                    d.y += d.speed; if(d.y > canvas.height) { d.y = -d.len; d.x = Math.random()*canvas.width; }
                });
                requestAnimationFrame(drawRain);
            }
            drawRain();

            // عداد الزوار الأساسي من السيرفر
            const vCountElement = document.getElementById('vCount');
            const cachedCount = localStorage.getItem('vortx_last_count') || "0";
            vCountElement.innerText = cachedCount;

            fetch(`https://api.counterapi.dev/v1/vortx_official_page/total_visits/up`)
                .then(res => res.json())
                .then(data => {
                    if(data && data.count) {
                        const num = data.count.toLocaleString();
                        vCountElement.innerText = num;
                        localStorage.setItem('vortx_last_count', num);
                    }
                }).catch(() => console.log("Using cached view count."));

            // حركة الروبوت الذكية بالإشارة لزر التيليجرام
            const robot = document.getElementById('cyber-robot');
            const laser = document.getElementById('robot-laser');
            const tgBtn = document.getElementById('telegram-btn');

            setTimeout(() => {
                robot.style.opacity = '1';
                setTimeout(() => {
                    if(!tgBtn) return;
                    laser.style.width = "100px";
                    laser.style.transform = "rotate(45deg)";
                    laser.style.opacity = '1';
                    tgBtn.classList.add('btn-blue-reaction');
                    setTimeout(() => { 
                        laser.style.opacity = '0'; 
                        tgBtn.classList.remove('btn-blue-reaction'); 
                    }, 1200);
                }, 1000);
            }, 500);
        });

        // تأثير الفلاش الخفيف عند الضغط العشوائي في الشاشة
        const flash = document.getElementById('flash');
        document.addEventListener('click', (e) => {
            if (e.target.closest('.link-btn') || e.target.closest('.copy-box')) return;
            flash.style.opacity = '1'; setTimeout(() => { flash.style.opacity = '0'; }, 80);
        });

        // دالة نسخ الرابط الذكية والسريعة
        function copyTelegramLink() {
            const link = "https://t.me/v_ortx";
            navigator.clipboard.writeText(link).then(() => {
                const box = document.getElementById('copyBox');
                const oldHTML = box.innerHTML;
                box.innerHTML = '<span style="color: #00f3ff; font-weight: bold; width: 100%; text-align: center;">Copied! ✔️</span>';
                setTimeout(() => { box.innerHTML = oldHTML; }, 1800);
            });
        }
    </script>
</body>
</html>
