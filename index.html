<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Premium Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #030207;
            --hologram-pink: #ff0055;
            --hologram-cyan: #00f3ff;
            --premium-purple: #7000ff;
            --glass-core: rgba(5, 3, 10, 0.55);
            --border-glow: rgba(0, 243, 255, 0.15);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background-color: var(--bg-void);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            padding: 30px 20px; 
            color: #fff;
            overflow-x: hidden; 
            font-family: 'Plus Jakarta Sans', 'Tajawal', sans-serif;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- تأثير السديم الكوني السائل في الخلفية (شيء يفتح الفم صدق) --- */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            z-index: 1;
            mix-blend-mode: screen;
            filter: blur(120px);
            opacity: 0.42;
            pointer-events: none;
            will-change: transform;
        }
        body::before {
            background: var(--premium-purple);
            top: -10%;
            left: -10%;
            animation: nebulaMove 12s infinite alternate ease-in-out;
        }
        body::after {
            background: var(--hologram-cyan);
            bottom: -10%;
            right: -10%;
            animation: nebulaMove 15s infinite alternate-reverse ease-in-out;
        }

        @keyframes nebulaMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 50px) scale(1.3); }
        }

        /* --- الحاوية الفخمة المستوحاة من استوديوهات المونتاج العالمية --- */
        .main-card {
            background: var(--glass-core);
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06); 
            border-radius: 32px; 
            padding: 50px 35px;
            width: 100%; 
            max-width: 430px; 
            text-align: center;
            position: relative; 
            z-index: 10;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1),
                        0 0 40px rgba(112, 0, 25ff, 0.05);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: translateY(40px) scale(0.96); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* --- إطار اللوقو الخرافي (اللي أعجبك مع لمسة تطوير ناعمة) --- */
        .logo-frame {
            width: 130px; height: 130px; 
            margin: 0 auto 25px; 
            border-radius: 50%; 
            padding: 4px;
            background: linear-gradient(135deg, var(--hologram-cyan) 0%, var(--premium-purple) 50%, var(--hologram-pink) 100%);
            box-shadow: 0 0 35px rgba(112, 0, 255, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.2);
            position: relative;
        }
        .logo-frame::after {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%; background: inherit; z-index: -1; filter: blur(10px); opacity: 0.6;
        }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #030207; }

        /* --- النصوص والعناوين العصرية --- */
        .brand-title { margin-bottom: 6px; position: relative; display: inline-block; }
        .title-asset { width: 80%; max-width: 200px; display: block; margin: 0 auto; filter: drop-shadow(0 0 20px rgba(0, 243, 25ff, 0.3)); }

        .tagline-panel {
            margin-bottom: 35px; padding: 6px 18px; 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 100px; display: inline-block;
        }
        .tagline-text {
            font-size: 11px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff, #858b90); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- الأزرار السينمائية الفخمة جداً --- */
        .links-container { display: flex; flex-direction: column; gap: 16px; }
        
        .premium-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff; 
            background: rgba(255, 255, 255, 0.03);
            padding: 18px; border-radius: 16px; 
            font-size: 16px; font-weight: 800; letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.04); 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
        }
        
        /* حركة اللمعان السينمائي عند مرور الماوس */
        .premium-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: skewX(-25deg); transition: 0.75s;
        }
        .premium-btn:hover::before { left: 150%; }

        .premium-btn:hover { 
            transform: translateY(-3px) scale(1.02); 
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(0, 243, 255, 0.4);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 243, 255, 0.1);
        }

        /* زر المتجر الخاص الفاخر */
        .exclusive-store { 
            background: linear-gradient(135deg, #6200ee 0%, #3b00b0 100%); 
            border: none;
            box-shadow: 0 10px 25px rgba(98, 0, 238, 0.4);
        }
        .exclusive-store:hover {
            background: linear-gradient(135deg, #7214ff 0%, #4600cc 100%); 
            box-shadow: 0 15px 35px rgba(98, 0, 238, 0.6), 0 0 20px rgba(112, 0, 25ff, 0.3);
        }

        .btn-icon-asset { width: 24px; height: 24px; margin-right: 14px; object-fit: contain; }

        /* --- صندوق النسخ التكتيكي النظيف --- */
        .crypto-copy-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 14px; padding: 14px 18px; margin-top: -6px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; font-weight: 700; color: rgba(255, 255, 255, 0.5); 
            cursor: pointer; transition: all 0.3s ease;
        }
        .crypto-copy-box:hover {
            background: rgba(0, 243, 255, 0.04);
            color: var(--hologram-cyan);
            border-color: var(--hologram-cyan);
        }
        .copy-status-icon { font-size: 15px; opacity: 0.6; }

        /* --- عداد الزوار الزجاجي الراقي --- */
        .live-counter-panel { margin-top: 35px; display: flex; justify-content: center; }
        .live-badge { 
            display: inline-flex; align-items: center; padding: 8px 24px; font-size: 12px; font-weight: 700;
            color: rgba(255, 255, 255, 0.6); background: rgba(255, 255, 255, 0.01); 
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 100px; 
            letter-spacing: 0.5px;
        }
        .live-badge span { color: var(--hologram-cyan); font-weight: 800; margin-left: 6px; text-shadow: 0 0 12px var(--hologram-cyan); }

        /* أيقونات جانبية هادئة وفخمة بالزوايا */
        .ambient-asset {
            position: fixed; z-index: 2; width: 90px; pointer-events: none; opacity: 0.15;
            filter: drop-shadow(0 0 30px var(--premium-purple));
            animation: ambientFloat 8s infinite ease-in-out;
        }
        .asset-ae { top: 12%; right: 8%; }
        .asset-am { bottom: 12%; left: 8%; animation-delay: 4s; }

        @keyframes ambientFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(8deg); }
        }
    </style>
</head>
<body>

    <img src="ae.png" alt="AE" class="ambient-asset asset-ae">
    <img src="am.png" alt="AM" class="ambient-asset asset-am">

    <div class="main-card" id="vortxHub">
        
        <div class="logo-frame">
            <img src="lg.png" alt="VORTX Avatar" class="profile-img">
        </div>
        
        <div class="brand-title">
            <img src="vr.png" alt="VORTX" class="title-asset">
        </div>
        
        <div class="tagline-panel">
            <span class="tagline-text">Master Your Motion</span>
        </div>

        <div class="links-container">
            <a href="store.html" class="premium-btn exclusive-store">🛒 Online Store</a>
            
            <a href="https://www.tiktok.com/@ortr.1?_r=1&_t=ZS-94WfLhF9TMt" target="_blank" class="premium-btn">
                <img src="tik.png" alt="TikTok" class="btn-icon-asset"> TikTok
            </a>
            
            <a href="https://t.me/v_ortx" target="_blank" class="premium-btn">
                <img src="tly.png" alt="Telegram" class="btn-icon-asset"> Telegram
            </a>
            
            <div class="crypto-copy-box" onclick="secureCopyLink()" id="interactiveCopy">
                <span>https://t.me/v_ortx</span>
                <span class="copy-status-icon">📋</span>
            </div>

            <a href="https://www.instagram.com/toix.8i?igsh=Z3B1eWdwNGJocW9q" target="_blank" class="premium-btn">
                <img src="ins.png" alt="Instagram" class="btn-icon-asset"> Instagram
            </a>
        </div>

        <div class="live-counter-panel">
            <div class="live-badge">👁 VISITORS: <span id="visitorCount">...</span></div>
        </div>
    </div>

    <script>
        // إغلاق الكليك يمين للمظهر الاحترافي ومنع سرقة الهوية
        document.addEventListener('contextmenu', e => e.preventDefault()); 

        window.addEventListener('load', () => {
            // جلب عداد الزوار بشكل نظيف وسريع جداً بدون تعليق الصفحة
            const countView = document.getElementById('visitorCount');
            const localCache = localStorage.getItem('vortx_clean_count') || "1,250";
            countView.innerText = localCache;

            fetch(`https://api.counterapi.dev/v1/vortx_official_page/total_visits/up`)
                .then(res => res.json())
                .then(data => {
                    if(data && data.count) {
                        const formatted = data.count.toLocaleString();
                        countView.innerText = formatted;
                        localStorage.setItem('vortx_clean_count', formatted);
                    }
                }).catch(() => console.log("Live stream context loaded."));
        });

        // دالة النسخ التكتيكية السلسة بنظام التبديل اللحظي
        function secureCopyLink() {
            const secureUrl = "https://t.me/v_ortx";
            navigator.clipboard.writeText(secureUrl).then(() => {
                const box = document.getElementById('interactiveCopy');
                const prevContent = box.innerHTML;
                box.innerHTML = '<span style="color: var(--hologram-cyan); font-weight: bold; width: 100%; text-align: center; letter-spacing: 1px;">COPIED SECURELY ✔️</span>';
                setTimeout(() => { box.innerHTML = prevContent; }, 1500);
            });
        }
    </script>
</body>
</html>
