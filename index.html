<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta name="google-site-verification" content="BPuifzaoojdHfh8jOK-lNjPPOXayJUYciXxjeTFaDrY" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Pro Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=700;900&family=Tajawal:wght=400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --neon-green-dark: #004d00;
            --bg-dark: #05000a;
            --robot-color: #9d00ff;
            --robot-red: #ff003c;
            --robot-size: 45px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            padding: 90px 20px 50px; 
            color: #fff;
            overflow-x: hidden; 
            position: relative;
            font-family: 'Tajawal', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            transform: translateZ(0);
        }

        /* --- 1. Background Effects --- */
        #rainCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; opacity: 1; transition: opacity 1s ease-in; }
        .lightning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(200, 0, 255, 0.15); opacity: 0; pointer-events: none; z-index: 9998; transition: opacity 0.1s; }

        /* --- 2. Corner Icons --- */
        .bg-icon { position: absolute; z-index: 150; width: 120px; pointer-events: none; opacity: 0; will-change: transform, opacity; }
        .bg-ae { top: 20px; right: 20px; filter: drop-shadow(0 0 25px var(--neon-purple)); animation: fadeInIcon 0.5s ease forwards 0.2s, float 6s infinite 0.5s; }
        .bg-am { bottom: 85px; left: 20px; border-radius: 50%; filter: drop-shadow(0 0 25px var(--neon-green-dark)); animation: fadeInIcon 0.5s ease forwards 0.2s, float-rev 7s infinite 0.5s; }
        @keyframes fadeInIcon { to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes float-rev { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(15px); } }

        /* --- 3. Main Glass Container --- */
        .container { background: linear-gradient(135deg, rgba(5, 0, 10, 0.75) 0%, rgba(20, 0, 35, 0.6) 100%); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(157, 0, 255, 0.3); border-radius: 30px; padding: 50px 30px; width: 100%; max-width: 440px; text-align: center; position: relative; z-index: 100; box-shadow: 0 0 40px rgba(157, 0, 255, 0.2), inset 0 0 15px rgba(255, 255, 255, 0.03); overflow: hidden; margin: 0 auto; opacity: 0; transform: scale(0.95); animation: containerReveal 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes containerReveal { to { opacity: 1; transform: scale(1); } }
        #innerBouncingCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 1; transition: opacity 1s ease-in; }

        /* --- 4. Entrance --- */
        .logo-container, .title-container, .crystal-panel, .link-btn, .visitor-badge-container, .copy-box { position: relative; z-index: 10; opacity: 0; animation: fadeInUpBlur 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fadeInUpBlur { 0% { opacity: 0; transform: translateY(20px); filter: blur(5px); } 100% { opacity: 1; transform: translateY(0); filter: blur(0); } }
        .logo-container { animation-delay: 0.1s; } .title-container { animation-delay: 0.2s; } .crystal-panel { animation-delay: 0.3s; } .link-btn:nth-child(1) { animation-delay: 0.4s; } .link-btn:nth-child(2) { animation-delay: 0.5s; } .link-btn:nth-child(3) { animation-delay: 0.6s; } .copy-box { animation-delay: 0.65s; } .link-btn:nth-child(5) { animation-delay: 0.7s; } .visitor-badge-container { animation-delay: 0.8s; }

        /* --- 5. Elements --- */
        .logo-container { width: 140px; height: 140px; margin: 0 auto 15px; border-radius: 50%; padding: 4px; background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue)); box-shadow: 0 0 30px rgba(157, 0, 255, 0.8), 0 0 15px rgba(0, 243, 255, 0.5); }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid #05000a; }
        .title-container { margin: 15px auto 5px; } .title-img { width: 85%; max-width: 250px; display: block; margin: 0 auto; filter: drop-shadow(0 0 25px rgba(157, 0, 255, 0.9)); }
        .glitch { animation: glitch 5s infinite; } @keyframes glitch { 0%, 92%, 100% { transform: translate(0); } 94% { transform: translate(2px, -2px); } 96% { transform: translate(-2px, 2px); } }
        .crystal-panel { margin: 5px auto 30px; padding: 12px 25px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border-radius: 12px; overflow: hidden; display: inline-block; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); }
        .crystal-text { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; background: linear-gradient(180deg, #ffffff 0%, #9aa0a6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .link-btn { display: flex; align-items: center; justify-content: center; text-decoration: none; color: #fff; background: rgba(0, 0, 0, 0.5); padding: 18px; border-radius: 15px; font-size: 17px; font-weight: 700; border: 1px solid rgba(157, 0, 255, 0.3); transition: all 0.2s ease; }
        .link-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #b400ff, 0 0 30px #7a00ff; border-color: var(--neon-purple); }
        .store-btn { background: linear-gradient(90deg, #4a00e0, #8e2de2); }
        .btn-icon { width: 44px; height: 44px; margin-right: 12px; object-fit: contain; pointer-events: none; }
        .copy-box { background: rgba(255, 255, 255, 0.03); border: 1px dashed rgba(0, 243, 255, 0.3); border-radius: 10px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: 700; color: rgba(255, 255, 255, 0.7); cursor: pointer; }
        .copy-box:hover { background: rgba(0, 243, 255, 0.1); color: #00f3ff; border-color: #00f3ff; }
        .visitor-badge-container { margin-top: 35px; display: flex; justify-content: center; }
        .visitor-badge { display: inline-flex; align-items: center; padding: 10px 25px; font-size: 14px; color: rgba(255, 255, 255, 0.8); background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; }
        .visitor-badge span { color: #d866ff; font-weight: 900; margin-left: 5px; }

        .robot-wrapper { position: absolute; top: 45px; left: 50%; margin-left: -22.5px; width: var(--robot-size); height: var(--robot-size); z-index: 9999; opacity: 0; transition: opacity 0.5s; }
        .robot-body { width: 100%; height: 80%; background: linear-gradient(135deg, #2b004a, var(--robot-color)); border-radius: 12px; position: relative; box-shadow: 0 0 15px var(--robot-color); }
        .robot-eye { width: 6px; height: 6px; background: #00f3ff; border-radius: 50%; }
        .robot-mouth { width: 14px; height: 6px; position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); border-bottom: 2px solid #00f3ff; }
    </style>
</head>
<body>
    <canvas id="rainCanvas"></canvas>
    <div class="container" id="mainContainer">
        <div class="logo-container"><img src="lg.png" alt="Avatar" class="logo"></div>
        <div class="title-container"><img src="vr.png" alt="VORTX" class="title-img glitch"></div>
        <div class="crystal-panel"><span class="crystal-text">Master Your Motion</span></div>
        <div class="links-wrapper">
            <a href="store.html" class="link-btn store-btn">🛒 Online Store</a>
            <a href="https://www.tiktok.com/@ortr.1?_r=1&_t=ZS-94WfLhF9TMt" target="_blank" class="link-btn">TikTok</a>
            <a href="https://t.me/v_ortx" target="_blank" class="link-btn">Telegram</a>
            <div class="copy-box" onclick="copyTelegramLink()">https://t.me/v_ortx 📋</div>
            <a href="https://www.instagram.com/toix.8i?igsh=Z3B1eWdwNGJocW9q" target="_blank" class="link-btn">Instagram</a>
        </div>
        <div class="visitor-badge-container">
            <div class="visitor-badge">👁 Visitors: <span id="vCount">18,000</span></div>
        </div>
    </div>

    <script>
        // العداد الآمن (محاكاة فقط - لا يتصل بسيرفرات)
        const vCountElement = document.getElementById('vCount');
        let currentCount = parseInt(localStorage.getItem('fake_v_count')) || 18000;
        
        // زيادة عشوائية كل ما يفتح المستخدم الموقع
        currentCount += Math.floor(Math.random() * 5) + 1;
        localStorage.setItem('fake_v_count', currentCount);
        vCountElement.innerText = currentCount.toLocaleString();

        function copyTelegramLink() {
            navigator.clipboard.writeText("https://t.me/v_ortx").then(() => alert("Copied!"));
        }
    </script>
</body>
</html>
