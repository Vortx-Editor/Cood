<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Pro Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --neon-green-dark: #004d00; 
            --bg-dark: #05000a;
        }

        /* --- تأثير ذرات الغبار المتحركة في الخلفية --- */
        @keyframes particles {
            0% { background-position: 0 0; }
            100% { background-position: 100% 100%; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            /* إضافة طبقة ذرات غبار وهمية باستخدام تدرج نقطي */
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(157, 0, 255, 0.05) 1px, transparent 0),
                radial-gradient(circle at 15% 50%, rgba(157, 0, 255, 0.1), transparent 25%);
            background-size: 50px 50px, 100% 100%;
            animation: particles 100s linear infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px; 
            color: #fff;
            overflow-x: hidden; 
        }

        .main-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px; /* 🟢 تكبير العرض */
            margin-top: 20px;
        }

        /* --- الشعارات مع تأثير التنعيم والدمج (Oil/Smooth Effect) --- */
        .bg-icon-right, .bg-icon-left {
            position: absolute;
            width: 140px; 
            z-index: 0; 
            /* 🔴 سر التنعيم: دمج الضباب مع التوهج لإخفاء الحواف الحادة */
            filter: blur(0.5px) contrast(1.1) drop-shadow(0 0 30px var(--neon-purple));
            mix-blend-mode: screen; /* يخليها تندمج مع السواد اللي وراها */
            pointer-events: none;
        }

        .bg-icon-right {
            top: -55px; 
            right: -55px; 
            border-radius: 20px;
            animation: floatRight 6s ease-in-out infinite;
        }

        .bg-icon-left {
            top: -55px; 
            left: -55px; 
            border-radius: 50%; 
            filter: blur(0.5px) contrast(1.1) drop-shadow(0 0 30px var(--neon-green-dark));
            animation: floatLeft 7s ease-in-out infinite reverse; 
        }

        @keyframes floatRight { 0%, 100% { transform: translate(0, 0) rotate(5deg); } 50% { transform: translate(-10px, -15px) rotate(10deg); } }
        @keyframes floatLeft { 0%, 100% { transform: translate(0, 0) rotate(-10deg); } 50% { transform: translate(10px, -15px) rotate(-15deg); } }

        /* --- المستطيل المرآة (Mirror/Glass Surface) --- */
        .container {
            /* 🔴 تأثير المرآة: زيادة الشفافية مع لمعة بيضاء علوية */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(20, 5, 35, 0.8) 100%);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 60px 35px; /* 🟢 تطويل الطول وزيادة الحشوة */
            width: 100%;
            text-align: center;
            box-shadow: 
                0 0 50px rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(255, 255, 255, 0.05); /* لمعة داخلية */
            position: relative;
            z-index: 10;
        }

        /* --- اللوقو الشخصي --- */
        .logo-container {
            width: 160px; 
            height: 160px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, var(--neon-purple), #fff);
            box-shadow: 0 0 40px var(--neon-purple);
            position: relative;
        }

        .logo {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid #05000a;
        }

        /* --- وميض كهربائي للاسم --- */
        @keyframes electricPulse {
            0%, 100% { filter: drop-shadow(0 0 15px var(--neon-purple)) brightness(1); }
            50% { filter: drop-shadow(0 0 30px var(--neon-purple)) brightness(1.3); }
        }

        .title-img {
            width: 90%; 
            max-width: 280px; 
            margin: 10px auto;
            display: block;
            animation: electricPulse 3s infinite ease-in-out;
        }

        p.bio {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* --- الأزرار --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }

        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff;
            background: rgba(255, 255, 255, 0.03);
            padding: 18px;
            border-radius: 18px;
            font-size: 18px; font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.2);
            transition: 0.4s;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .link-btn:hover {
            background: rgba(157, 0, 255, 0.15);
            border-color: var(--neon-blue);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 243, 255, 0.1);
        }

        .store-btn {
            background: linear-gradient(90deg, #6200ea, #d500f9);
            border: none;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <img src="am.png" alt="AM" class="bg-icon-left">
        <img src="ae.png" alt="AE" class="bg-icon-right">

        <div class="container">
            <div class="logo-container">
                <img src="lg.png" alt="VORTX" class="logo">
            </div>

            <img src="vr.png" alt="VORTX" class="title-img">
            
            <p class="bio">Edit & Motion Graphics | Professional</p>

            <div class="links-wrapper">
                <a href="#" class="link-btn store-btn">🛒 المتجر الإلكتروني</a>
                <a href="#" class="link-btn">📱 تيك توك</a>
                <a href="#" class="link-btn">▶️ يوتيوب</a>
                <a href="#" class="link-btn">📸 إنستقرام</a>
            </div>
        </div>
    </div>

</body>
</html>
