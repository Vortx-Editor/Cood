<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX // CORE_SYSTEM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Share+Tech+Mono&family=Tajawal:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-glow: #00f3ff;
            --vortex-purp: #7a00ff;
            --cyber-dark: #020105;
            --panel-bg: rgba(6, 3, 14, 0.75);
            --matrix-green: #00ff66;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--cyber-dark);
            min-height: 100vh;
            color: #fff;
            font-family: 'Orbitron', 'Tajawal', sans-serif;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- خطوط الشبكة السيبرانية المتحركة بالخلفية --- */
        .cyber-grid {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: linear-gradient(rgba(122, 0, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(122, 0, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; background-position: center;
            z-index: 1; pointer-events: none;
        }
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: rgba(0, 243, 255, 0.1); opacity: 0.6;
            z-index: 2; pointer-events: none;
            animation: scan 6s linear infinite;
        }
        @keyframes scan { 0% { top: -5%; } 100% { top: 105%; } }

        /* --- شريط النظام العلوي (هيبة واجهات الاختراق والمونتاج) --- */
        .top-hud-bar {
            width: 100%; padding: 15px 30px;
            background: rgba(4, 2, 8, 0.9);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            position: relative; z-index: 100;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px; letter-spacing: 2px; color: rgba(255,255,255,0.6);
        }
        .system-status span { color: var(--matrix-green); font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- الهيكل الجذري الجديد: تقسيم الشاشة التكتيكي (Grid OS Layout) --- */
        .dashboard-matrix {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 25px;
            width: 100%;
            max-width: 1300px;
            margin: auto;
            padding: 30px;
            position: relative;
            z-index: 10;
        }

        /* اللوحات التكتيكية الزجاجية مشطوفة الأطراف */
        .cyber-panel {
            background: var(--panel-bg);
            border: 1px solid rgba(122, 0, 255, 0.25);
            border-radius: 16px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 0 20px rgba(122,0,255,0.1);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            transition: border-color 0.4s;
        }
        .cyber-panel:hover { border-color: var(--neon-glow); }

        /* زوايا الديكور العسكرية التقنية المذهلة */
        .cyber-panel::before, .cyber-panel::after {
            content: ''; position: absolute; width: 12px; height: 12px; border-color: var(--neon-glow); border-style: solid; pointer-events: none;
        }
        .cyber-panel::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .cyber-panel::after { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

        /* --- اللوحة اليسرى: وحدة الهوية والتحكم --- */
        .identity-module { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        /* إطار اللوقو اللي عجبك مع تدعيم التوهج الفخم المطور */
        .quantum-frame {
            width: 160px; height: 160px; border-radius: 50%; padding: 4px; margin-bottom: 25px;
            background: linear-gradient(135deg, var(--neon-glow) 0%, var(--vortex-purp) 50%, #ff0055 100%);
            box-shadow: 0 0 40px rgba(122, 0, 255, 0.5);
            position: relative;
        }
        .avatar-core { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 5px solid var(--cyber-dark); }

        .brand-vector { width: 90%; max-width: 260px; margin-bottom: 10px; filter: drop-shadow(0 0 20px var(--vortex-purp)); }
        
        .hud-decoder {
            font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--neon-glow);
            letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px;
        }

        /* عداد المشاهدات المدمج داخل لوحة البيانات التكتيكية */
        .data-stream-box {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px; padding: 15px; font-family: 'Share Tech Mono', monospace; font-size: 13px;
            text-align: left; display: flex; justify-content: space-between; align-items: center;
        }
        .data-stream-box span.count-num { color: var(--neon-glow); font-weight: bold; text-shadow: 0 0 10px var(--neon-glow); font-size: 16px; }

        /* --- اللوحة اليمنى: مصفوفة الشبكة التفاعلية (المستقبل الحقيقي) --- */
        .links-matrix-grid { display: flex; flex-direction: column; gap: 18px; justify-content: center; h-index: 5; }

        /* هندسة الأزرار الجديدة: شق تكتيكي مشطوف يتفاعل في الأبعاد ثلاثية الـ 3D */
        .matrix-cell {
            display: flex; align-items: center; justify-content: space-between;
            text-decoration: none; color: #fff; padding: 22px 30px; border-radius: 12px;
            background: linear-gradient(90deg, rgba(255,255,255,0.02) 0%, rgba(122, 0, 255, 0.03) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 16px; font-weight: 900; letter-spacing: 1.5px;
            position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .matrix-cell::after {
            content: '// CELL_READY'; position: absolute; right: 30px; 
            font-family: 'Share Tech Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.2);
        }

        .matrix-cell:hover {
            transform: translateX(10px) scale(1.01);
            background: linear-gradient(90deg, rgba(0, 243, 255, 0.1) 0%, rgba(122, 0, 255, 0.1) 100%);
            border-color: var(--neon-glow);
            box-shadow: -10px 0 25px rgba(0, 243, 255, 0.2);
        }
        .matrix-cell:hover::after { color: var(--neon-glow); content: '// EXECUTE_'; }

        /* المتجر الفاخر الحصري المتميز كلياً */
        .cell-store {
            background: linear-gradient(90deg, #6200ee 0%, #a000ff 100%);
            border: none; box-shadow: 0 10px 30px rgba(98, 0, 238, 0.3);
        }
        .cell-store:hover {
            background: linear-gradient(90deg, #7214ff 0%, #b014ff 100%);
            box-shadow: 0 15px 40px rgba(98, 0, 238, 0.5), -10px 0 20px var(--neon-glow);
        }

        .cell-icon { width: 26px; height: 26px; object-fit: contain; margin-right: 15px; }
        .inner-flex { display: flex; align-items: center; }

        /* صندوق النسخ المطور المدمج كلياً بنظام التشفير */
        .crypto-vault-box {
            background: rgba(0, 0, 0, 0.5); border: 1px dashed rgba(122, 0, 255, 0.4);
            border-radius: 12px; padding: 16px 30px; display: flex; justify-content: space-between;
            align-items: center; font-family: 'Share Tech Mono', monospace; font-size: 14px;
            color: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s;
        }
        .crypto-vault-box:hover {
            border-color: var(--neon-glow); color: var(--neon-glow); background: rgba(0, 243, 255, 0.03);
        }

        /* --- متوافق بالملي مع الجوال والكمبيوتر بدون تدمير المظهر --- */
        @media (max-width: 850px) {
            body { overflow-y: auto; }
            .dashboard-matrix { grid-template-columns: 1fr; gap: 20px; padding: 15px; }
            .cyber-panel { padding: 30px 20px; }
            .top-hud-bar { padding: 12px 15px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <!-- عناصر الواجهة الكونية الخلفية -->
    <div class="cyber-grid"></div>
    <div class="scanline"></div>

    <!-- شريط القيادة العلوي التكتيكي -->
    <div class="top-hud-bar">
        <div>SYS_NODE: VORTX_CORE_v2.6</div>
        <div class="system-status">NETWORK_STATUS: <span>ONLINE</span></div>
    </div>

    <!-- مصفوفة لوحة التحكم الشاملة -->
    <div class="dashboard-matrix">
        
        <!-- اللوحة اليسرى: معلومات الهوية والمسار والزوار -->
        <div class="cyber-panel identity-module">
            <div class="quantum-frame">
                <img src="lg.png" alt="VORTX Avatar" class="avatar-core">
            </div>
            <img src="vr.png" alt="VORTX" class="brand-vector">
            <div class="hud-decoder">MASTER YOUR MOTION</div>
            
            <!-- لوحة العداد المدمجة الاحترافية -->
            <div class="data-stream-box">
                <span>[✦] TOTAL_TRAFFIC_LOG:</span>
                <span class="count-num" id="liveViews">...</span>
            </div>
        </div>

        <!-- اللوحة اليمنى: مصفوفة الشقوق والروابط التكتيكية -->
        <div class="cyber-panel links-matrix-grid">
            
            <a href="store.html" class="matrix-cell cell-store">
                <span class="inner-flex">🛒 Online Store</span>
            </a>
            
            <a href="https://www.tiktok.com/@ortr.1?_r=1&_t=ZS-94WfLhF9TMt" target="_blank" class="matrix-cell">
                <span class="inner-flex"><img src="tik.png" alt="TikTok" class="cell-icon"> TikTok</span>
            </a>
            
            <a href="https://t.me/v_ortx" target="_blank" class="matrix-cell">
                <span class="inner-flex"><img src="tly.png" alt="Telegram" class="cell-icon"> Telegram</span>
            </a>
            
            <!-- وحدة التشفير والنسخ السريع -->
            <div class="crypto-vault-box" onclick="executeVaultCopy()" id="vaultBox">
                <span>🔗 t.me/v_ortx</span>
                <span>[COPY_SECURE]</span>
            </div>

            <a href="https://www.instagram.com/toix.8i?igsh=Z3B1eWdwNGJocW9q" target="_blank" class="matrix-cell">
                <span class="inner-flex"><img src="ins.png" alt="Instagram" class="cell-icon"> Instagram</span>
            </a>
            
        </div>

    </div>

    <script>
        // إقفال كليك يمين لثبيت الطابع الاحترافي التام لمنظومتك
        document.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('load', () => {
            // مزامنة داتا حركة الزوار بشكل سيبراني مشفر ونظيف
            const trafficNode = document.getElementById('liveViews');
            const cachedViews = localStorage.getItem('vortx_matrix_views') || "3,500";
            trafficNode.innerText = cachedViews;

            fetch(`https://api.counterapi.dev/v1/vortx_official_page/total_visits/up`)
                .then(res => res.json())
                .then(data => {
                    if(data && data.count) {
                        const packedNum = data.count.toLocaleString();
                        trafficNode.innerText = packedNum;
                        localStorage.setItem('vortx_matrix_views', packedNum);
                    }
                }).catch(() => console.log("System terminal secure sync active."));
        });

        // دالة النسخ التكتيكي الفوري المتفاعل مع الهوية الجديدة
        function executeVaultCopy() {
            const secureLink = "https://t.me/v_ortx";
            navigator.clipboard.writeText(secureLink).then(() => {
                const vault = document.getElementById('vaultBox');
                const oldContent = vault.innerHTML;
                vault.innerHTML = '<span style="color: var(--neon-glow); font-weight: bold; width: 100%; text-align: center; letter-spacing: 2px;">[// SYSTEM_LINK_COPIED_SUCCESSFULLY]</span>';
                setTimeout(() => { vault.innerHTML = oldContent; }, 1600);
            });
        }
    </script>
</body>
</html>
