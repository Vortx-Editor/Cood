<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --neon-green-glow: #004d00; /* 🟢 Alight Motion Brand Glow */
            --bg-dark: #0b001a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Sparks (External) */
        #sparkCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* --- 1. Maintain Positions --- */
        .bg-icon {
            position: absolute;
            z-index: -1; 
            pointer-events: none;
            opacity: 0.95;
        }

        .bg-ae {
            top: -45px; right: -45px;
            width: 130px;
            border-radius: 18px;
            filter: drop-shadow(0 0 35px var(--neon-purple));
            animation: floatAE 6s ease-in-out infinite;
        }

        .bg-am {
            bottom: -45px; left: -45px;
            width: 115px;
            border-radius: 50%;
            /* 🟢 Changed glow to Dark Green per request */
            filter: drop-shadow(0 0 30px var(--neon-green-glow));
            animation: floatAM 7s ease-in-out infinite;
        }

        @keyframes floatAE { 0%, 100% { transform: translateY(0) rotate(15deg); } 50% { transform: translateY(-15px) rotate(20deg); } }
        @keyframes floatAM { 0%, 100% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(15px) rotate(-15deg); } }

        /* --- 2. Main Glass Container --- */
        .container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(20, 5, 35, 0.75) 100%);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 25px;
            padding: 45px 30px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 50px rgba(157, 0, 255, 0.2);
            overflow: hidden; /* Important for inner particles */
        }

        /* --- Inner Particles (Behind content) --- */
        #innerParticles {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; /* Stay behind everything inside */
        }

        .logo-container {
            width: 145px; height: 145px;
            margin: 0 auto 15px;
            border-radius: 50%;
            padding: 4px;
            background: var(--neon-purple);
            box-shadow: 0 0 30px var(--neon-purple);
        }

        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #0b001a; }

        .title-img {
            width: 85%; max-width: 250px;
            margin: 5px auto 10px;
            display: block;
            filter: drop-shadow(0 0 15px var(--neon-purple));
        }

        /* --- 2. Tagline Styling --- */
        .bio { 
            font-size: 15px; 
            color: #fff; 
            font-weight: 700; /* Bold */
            display: inline-block;
            margin-bottom: 30px; 
            padding-bottom: 10px; /* 10px gap */
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); /* Semi-transparent underline */
        }

        .links-wrapper { display: flex; flex-direction: column; gap: 14px; }

        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff;
            background: rgba(255, 255, 255, 0.03);
            padding: 16px 20px; border-radius: 14px;
            font-size: 17px; font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.2);
            transition: 0.3s ease;
        }

        .link-btn:hover {
            transform: scale(1.04);
            background: rgba(157, 0, 255, 0.15);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-purple);
        }

        .store-btn { background: linear-gradient(90deg, #4a00e0, #8e2de2); border: none; }

        .visitor-badge {
            display: inline-block;
            margin-top: 30px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>

    <canvas id="sparkCanvas"></canvas>

    <div class="container">
        <img src="ae.png" alt="AE" class="bg-icon bg-ae">
        <img src="am.png" alt="AM" class="bg-icon bg-am">

        <canvas id="innerParticles"></canvas>

        <div class="logo-container">
            <img src="lg.png" alt="Avatar" class="logo">
        </div>

        <img src="vr.png" alt="VORTX" class="title-img">
        
        <p class="bio">Here is everything useful</p>

        <div class="links-wrapper">
            <a href="#" class="link-btn store-btn">🛒 Online Store</a>
            <a href="#" class="link-btn">📱 TikTok</a>
            <a href="#" class="link-btn">💬 Telegram</a>
            <a href="#" class="link-btn">📸 Instagram</a>
        </div>

        <div class="visitor-badge">👁 Visitors: <span id="visitCount">0</span></div>
    </div>

    <script>
        // Visitor Counter
        document.getElementById('visitCount').innerText = Math.floor(Math.random() * 500) + 1200;

        // --- Inner Particles Logic ---
        const innerCanvas = document.getElementById('innerParticles');
        const iCtx = innerCanvas.getContext('2d');
        let iP = [];

        function resizeInner() {
            innerCanvas.width = innerCanvas.offsetWidth;
            innerCanvas.height = innerCanvas.offsetHeight;
        }

        class InnerP {
            constructor() {
                this.x = Math.random() * innerCanvas.width;
                this.y = Math.random() * innerCanvas.height;
                this.size = Math.random() * 1.5;
                this.vY = Math.random() * 0.3 + 0.1;
            }
            draw() {
                iCtx.fillStyle = 'rgba(157, 0, 255, 0.4)';
                iCtx.beginPath();
                iCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                iCtx.fill();
            }
            update() {
                this.y -= this.vY;
                if (this.y < 0) this.y = innerCanvas.height;
            }
        }

        function initInner() {
            iP = [];
            for(let i=0; i<30; i++) iP.push(new InnerP());
        }

        function animInner() {
            iCtx.clearRect(0,0,innerCanvas.width, innerCanvas.height);
            iP.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animInner);
        }

        window.addEventListener('resize', resizeInner);
        resizeInner(); initInner(); animInner();

        // --- Background Sparks Logic (Simplified for performance) ---
        const canvas = document.getElementById('sparkCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let sparks = [];
        for(let i=0; i<50; i++) {
            sparks.push({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                s: Math.random()*2, o: Math.random()*0.6,
                vx: (Math.random()-0.5)*1, vy: (Math.random()-0.5)*1
            });
        }
        function drawSparks() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            sparks.forEach(s => {
                s.x += s.vx; s.y += s.vy;
                if(s.x<0 || s.x>canvas.width) s.vx *= -1;
                if(s.y<0 || s.y>canvas.height) s.vy *= -1;
                ctx.fillStyle = `rgba(157, 0, 255, ${s.o})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(drawSparks);
        }
        drawSparks();
    </script>
</body>
</html>
