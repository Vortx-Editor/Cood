<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Pro Cyberpunk Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --bg-dark: #05000a; /* Darker for better galaxy contrast */
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        /* --- 2 & 13. Background Enhancements (Galaxy, Grid, Noise) --- */
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(157, 0, 255, 0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 243, 255, 0.1), transparent 40%),
                linear-gradient(rgba(157, 0, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(157, 0, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px; /* Tech Grid */
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: #fff; overflow-x: hidden; position: relative;
            font-family: 'Tajawal', sans-serif;
        }

        /* --- 6. Glowing Cursor Effect --- */
        #custom-cursor {
            position: fixed; width: 20px; height: 20px;
            background: var(--neon-purple); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            filter: blur(10px); opacity: 0.6; transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }

        /* --- 8. Intro Animation Overlay --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease-in-out;
        }
        .lightning-flash {
            position: absolute; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none;
        }

        /* --- 10 & 11. Container (Glassmorphism & Neon Edge) --- */
        .container {
            background: rgba(15, 5, 25, 0.8);
            backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px 30px;
            width: 100%; max-width: 460px;
            text-align: center; position: relative; z-index: 10;
            box-shadow: 0 0 50px rgba(157, 0, 255, 0.2), inset 0 0 20px rgba(255, 255, 255, 0.05);
            /* 5. Scroll & 8. Intro Entrance */
            transform: translateY(30px); opacity: 0;
            transition: all 1s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .container.reveal { transform: translateY(0); opacity: 1; }

        /* --- 1. Header (Logo & Glow) --- */
        .logo-container {
            width: 150px; height: 150px; margin: 0 auto 15px;
            border-radius: 50%; padding: 4px;
            background: var(--neon-purple);
            box-shadow: 0 0 35px var(--neon-purple);
            position: relative;
            /* 9. Micro Animation */
            animation: logoPulse 4s infinite ease-in-out;
        }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 30px var(--neon-purple); } 50% { transform: scale(1.03); box-shadow: 0 0 50px var(--neon-purple); } }

        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #05000a; }

        /* 4. Soft Reflection */
        .logo-container::after {
            content: ''; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            width: 80%; height: 10px; background: radial-gradient(ellipse, rgba(157, 0, 255, 0.3), transparent);
            filter: blur(5px);
        }

        .vortx-title {
            width: 85%; max-width: 260px; margin: 15px auto 5px; display: block;
            filter: drop-shadow(0 0 15px var(--neon-purple));
        }

        /* 1. Tagline */
        .tagline {
            font-size: 13px; color: var(--neon-blue); letter-spacing: 1px;
            text-transform: uppercase; margin-bottom: 30px; font-weight: 700;
            opacity: 0.8;
        }

        /* --- 3 & 9. Buttons --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }

        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff;
            background: rgba(255, 255, 255, 0.03);
            padding: 18px; border-radius: 15px;
            font-size: 17px; font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.2);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }

        /* 3. Button Hover & 7. Energy Click Effect */
        .link-btn:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(157, 0, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px rgba(157, 0, 255, 0.4);
        }
        
        /* 9. Micro floating for icons */
        .link-btn span { display: inline-block; margin-right: 10px; animation: iconFloat 3s infinite ease-in-out; }
        @keyframes iconFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        .store-btn { background: linear-gradient(90deg, #4a00e0, #8e2de2); border: none; }

        /* --- 13. Animated Background Particles & Lightning --- */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div id="intro-overlay">
        <div class="lightning-flash" id="flash"></div>
        <img src="lg.png" style="width: 120px; border-radius: 50%; box-shadow: 0 0 50px var(--neon-purple);" id="intro-logo">
    </div>

    <canvas id="bg-canvas"></canvas>

    <div class="container" id="main-card">
        <div class="logo-container">
            <img src="lg.png" alt="Avatar" class="logo">
        </div>

        <img src="vr.png" alt="VORTX" class="vortx-title">
        <p class="tagline">After Effects Templates & Motion Design Tools</p>

        <div class="links-wrapper">
            <a href="#" class="link-btn store-btn"><span>🛒</span> Online Store</a>
            <a href="#" class="link-btn"><span>📱</span> TikTok</a>
            <a href="#" class="link-btn"><span>💬</span> Telegram</a>
            <a href="#" class="link-btn"><span>📸</span> Instagram</a>
        </div>
    </div>

    <script>
        // --- 8. Intro Animation Logic ---
        window.addEventListener('load', () => {
            const flash = document.getElementById('flash');
            const overlay = document.getElementById('intro-overlay');
            const card = document.getElementById('main-card');

            // Quick purple lightning flash
            setTimeout(() => {
                flash.style.opacity = '1';
                flash.style.background = '#9d00ff';
                setTimeout(() => {
                    flash.style.opacity = '0';
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        card.classList.add('reveal'); // Smooth reveal
                    }, 800);
                }, 100);
            }, 500);
        });

        // --- 6. Cursor Effect ---
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // --- 2 & 13. BG Particles & Lightning VFX ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for(let i=0; i<60; i++) {
            particles.push({
                x: Math.random()*canvas.width,
                y: Math.random()*canvas.height,
                s: Math.random()*2,
                v: Math.random()*0.5 + 0.1
            });
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            
            // 13. Star-like particles
            ctx.fillStyle = "rgba(157, 0, 255, 0.4)";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
                ctx.fill();
                p.y -= p.v;
                if(p.y < 0) p.y = canvas.height;
            });

            // 13. Occasional Lightning Flicker
            if(Math.random() > 0.995) {
                ctx.strokeStyle = "rgba(157, 0, 255, 0.2)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(Math.random()*canvas.width, 0);
                ctx.lineTo(Math.random()*canvas.width, canvas.height);
                ctx.stroke();
            }

            requestAnimationFrame(draw);
        }
        draw();

        // 7. Click Pulse Interaction
        document.querySelectorAll('.link-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                let ripple = document.createElement('div');
                ripple.style.position = 'absolute';
                ripple.style.width = '100px'; ripple.style.height = '100px';
                ripple.style.background = 'rgba(0, 243, 255, 0.4)';
                ripple.style.borderRadius = '50%'; ripple.style.left = e.offsetX + 'px';
                ripple.style.top = e.offsetY + 'px'; ripple.style.transform = 'translate(-50%, -50%) scale(0)';
                ripple.style.transition = 'transform 0.5s ease-out, opacity 0.5s';
                this.appendChild(ripple);
                setTimeout(() => { ripple.style.transform = 'translate(-50%, -50%) scale(4)'; ripple.style.opacity = '0'; }, 10);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
</body>
</html>
