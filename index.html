<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX // NEURAL_GATE_2070</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-black: #000002;
            --quantum-cyan: #00f3ff;
            --bio-plasma: #ff007f;
            --neural-purple: #6200ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--void-black);
            min-height: 100vh;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px; /* بعد ثلاثي أبعاد سحيق */
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- محاكي حقل الجاذبية الكمي بالخلفية --- */
        #quantumField {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }

        /* --- ليزر المسح البيومتري عند الدخول --- */
        .biometric-scanner {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 48%, var(--quantum-cyan) 50%, transparent 52%);
            background-size: 100% 200%;
            z-index: 9999; pointer-events: none;
            opacity: 0.8;
            animation: bioScan 2s cubic-bezier(0.15, 1, 0.3, 1) forwards;
        }
        @keyframes bioScan {
            0% { background-position: 0% 0%; opacity: 1; backdrop-filter: blur(20px); }
            40% { backdrop-filter: blur(5px); }
            100% { background-position: 0% 100%; opacity: 0; backdrop-filter: blur(0px); }
        }

        /* --- الفضاء الهولوغرامي المركزي --- */
        .hologram-universe {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transform: rotateX(20deg) rotateY(0deg);
            will-change: transform;
        }

        /* --- مفاعل اللوقو المركزي المستعر --- */
        .quantum-core-logo {
            width: 150px; height: 150px;
            border-radius: 50%;
            position: absolute;
            z-index: 50;
            padding: 6px;
            background: radial-gradient(circle, var(--quantum-cyan), var(--bio-plasma));
            box-shadow: 0 0 60px var(--quantum-cyan), inset 0 0 20px #fff;
            transform: translateZ(100px); /* يطير قدام الأزرار */
            animation: corePulse 4s ease-in-out infinite alternate;
        }
        .core-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 6px solid var(--void-black); }

        @keyframes corePulse {
            0% { transform: translateZ(80px) scale(0.95); filter: drop-shadow(0 0 20px var(--quantum-cyan)); }
            100% { transform: translateZ(120px) scale(1.05); filter: drop-shadow(0 0 50px var(--bio-plasma)); }
        }

        /* --- مدار الروابط العائمة في البعد الثالث --- */
        .orbital-links-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            transform-style: preserve-3d;
        }

        /* هندسة البوابات الكونية (الأزرار المستقبلية الفخمة) */
        .neural-node {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff;
            width: 280px; padding: 18px;
            background: rgba(5, 1, 15, 0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-left: 4px solid var(--quantum-cyan);
            border-right: 4px solid var(--bio-plasma);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); /* شكل هندسي مشطوف مستقبلي */
            font-size: 14px; font-weight: 900; letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateZ(0px) rotateY(-15deg);
            position: relative;
        }

        /* ترتيب الأزرار في الفضاء لتبدو كأنها تلتف حول اللوقو */
        .neural-node:nth-child(1) { transform: translateZ(40px) rotateY(-20deg) translateY(-20px); }
        .neural-node:nth-child(2) { transform: translateZ(20px) rotateY(-10deg); }
        .neural-node:nth-child(3) { transform: translateZ(0px) rotateY(0deg); }
        .neural-node:nth-child(4) { transform: translateZ(20px) rotateY(10deg); }
        .neural-node:nth-child(5) { transform: translateZ(40px) rotateY(20deg) translateY(20px); }

        .neural-node:hover {
            background: linear-gradient(90deg, rgba(0, 243, 255, 0.15), rgba(255, 0, 127, 0.15));
            border-left-width: 8px; border-right-width: 8px;
            transform: translateZ(140px) rotateY(0deg) scale(1.1) !important;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.3);
            text-shadow: 0 0 10px #fff;
        }

        /* زر المتجر المصهور في تكنولوجيا الطاقة النيوتونية */
        .singularity-store-2070 {
            background: linear-gradient(90deg, var(--neural-purple) 0%, #3b00b0 100%);
            border-left-color: #fff; border-right-color: var(--quantum-cyan);
        }

        .node-icon-2070 { width: 22px; height: 22px; margin-right: 12px; object-fit: contain; }

        /* صندوق النسخ المشفر تكتيكياً */
        .quantum-capsule-copy {
            cursor: pointer; font-family: 'Share Tech Mono', monospace; font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        .quantum-capsule-copy:hover { color: var(--quantum-cyan); }

        /* --- عداد زوار المجرة السفلي العائم --- */
        .galaxy-traffic-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; font-family: 'Share Tech Mono', monospace; letter-spacing: 3px; font-size: 12px;
            color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.01);
            padding: 8px 24px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05);
        }
        .galaxy-traffic-panel span { color: var(--quantum-cyan); font-weight: bold; text-shadow: 0 0 10px var(--quantum-cyan); }

        /* شعار الهوية المدمج الشفاف العائم في الأعلى */
        .vortex-header-2070 {
            position: absolute; top: 40px; z-index: 100; text-align: center; pointer-events: none;
        }
        .header-logo-asset { width: 180px; filter: drop-shadow(0 0 15px var(--quantum-cyan)); opacity: 0.8; }

        /* دعم كامل واستجابة تامة للجوالات بدون تخريب الأبعاد */
        @media (max-width: 650px) {
            .hologram-universe { transform: scale(0.85) rotateX(15deg); }
            .neural-node { width: 250px; font-size: 13px; }
            .quantum-core-logo { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <!-- ليزر الدخول والمسح العصبي للزائر -->
    <div class="biometric-scanner"></div>

    <!-- حقل الطاقة السائل المتفاعل -->
    <canvas id="quantumField"></canvas>

    <!-- الهوية العلوية الطايرة -->
    <div class="vortex-header-2070">
        <img src="vr.png" alt="VORTX" class="header-logo-asset">
    </div>

    <!-- الكون الهولوغرامي ثلاثي الأبعاد -->
    <div class="hologram-universe" id="hologramSpace">
        
        <!-- النواة المركزية (اللوقو اللي عجبك إطاره) -->
        <div class="quantum-core-logo">
            <img src="lg.png" alt="VORTX Core" class="core-avatar">
        </div>

        <!-- مصفوفة المدارات العائمة -->
        <div class="orbital-links-container">
            
            <a href="store.html" class="neural-node singularity-store-2070">
                <span>🛒 Online Store</span>
            </a>
            
            <a href="https://www.tiktok.com/@ortr.1?_r=1&_t=ZS-94WfLhF9TMt" target="_blank" class="neural-node">
                <img src="tik.png" alt="TikTok" class="node-icon-2070"> TikTok
            </a>
            
            <a href="https://t.me/v_ortx" target="_blank" class="neural-node">
                <img src="tly.png" alt="Telegram" class="node-icon-2070"> Telegram
            </a>
            
            <!-- كبسولة النسخ التكتيكية -->
            <div class="neural-node quantum-capsule-copy" onclick="neuralCopy()" id="neuralCopyBox">
                <span>🔗 t.me/v_ortx</span>
            </div>

            <a href="https://www.instagram.com/toix.8i?igsh=Z3B1eWdwNGJocW9q" target="_blank" class="neural-node">
                <img src="ins.png" alt="Instagram" class="node-icon-2070"> Instagram
            </a>
            
        </div>

    </div>

    <!-- عداد حركة الزوار السيبراني للمجرة -->
    <div class="galaxy-traffic-panel">
        NEURAL_SYNC_LOGS: <span id="vortxCounter">...</span>
    </div>

    <script>
        // إقفال كليك يمين لفرض هيبة النظام وحمايته
        document.addEventListener('contextmenu', e => e.preventDefault());

        // بناء حقل الجاذبية السائل بالـ Canvas
        const canvas = document.getElementById('quantumField');
        const ctx = canvas.getContext('2d');
        let w, h, particles;
        let mouse = { x: null, y: null, radius: 150 };

        function initCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 2 + 1,
                    baseX: Math.random() * w,
                    baseY: Math.random() * h,
                    density: (Math.random() * 30) + 1,
                    color: Math.random() > 0.5 ? '#00f3ff' : '#ff007f'
                });
            }
        }
        initCanvas();
        window.addEventListener('resize', initCanvas);

        // تتبع حركة إصبع المستخدم أو الفأرة لتشويه نسيج الصفحة الجاذبي
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

        function animateField() {
            ctx.fillStyle = 'rgba(0, 0, 2, 0.2)';
            ctx.fillRect(0, 0, w, h);

            particles.forEach(p => {
                // حركة عشوائية خفيفة كأنها ذرات تطفو
                p.x += Math.sin(p.density) * 0.5;
                p.y += Math.cos(p.density) * 0.5;

                // التفاعل مع الجاذبية عند اقتراب المؤشر
                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - p.x;
                    let dy = mouse.y - p.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        let directionX = dx / distance;
                        let directionY = dy / distance;
                        p.x -= directionX * force * p.density * 0.5;
                        p.y -= directionY * force * p.density * 0.5;
                    }
                }

                // إعادة تدوير الذرات إذا خرجت عن الحدود
                if (p.x < 0 || p.x > w) p.x = Math.random() * w;
                if (p.y < 0 || p.y > h) p.y = Math.random() * h;

                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animateField);
        }
        animateField();

        // تدوير الكون الهولوغرامي تفاعلياً مع تحريك الشاشة
        const space = document.getElementById('hologramSpace');
        document.addEventListener('mousemove', (e) => {
            let rotateX = (window.innerHeight / 2 - e.clientY) / 25;
            let rotateY = (e.clientX - window.innerWidth / 2) / 25;
            space.style.transform = `rotateX(${20 + rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // مزامنة عداد حركة المرور الكمية
        window.addEventListener('load', () => {
            const counter = document.getElementById('vortxCounter');
            const cache = localStorage.getItem('vortx_2070_count') || "3,500";
            counter.innerText = cache;

            fetch(`https://api.counterapi.dev/v1/vortx_official_page/total_visits/up`)
                .then(res => res.json())
                .then(data => {
                    if(data && data.count) {
                        const formatted = data.count.toLocaleString();
                        counter.innerText = formatted;
                        localStorage.setItem('vortx_2070_count', formatted);
                    }
                });
        });

        // دالة النسخ بنظام التحويل الكبسولي اللحظي
        function neuralCopy() {
            const url = "https://t.me/v_ortx";
            navigator.clipboard.writeText(url).then(() => {
                const box = document.getElementById('neuralCopyBox');
                const oldContent = box.innerHTML;
                box.innerHTML = '<span style="color: var(--quantum-cyan); font-weight: bold; width:100%; text-align:center;">[// QUANTUM_COPIED_]</span>';
                setTimeout(() => { box.innerHTML = oldContent; }, 1500);
            });
        }
    </script>
</body>
</html>
