<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTX | Pro Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #9d00ff;
            --neon-blue: #00f3ff;
            --neon-green-dark: #004d00;
            --bg-dark: #05000a;
            --robot-color: #9d00ff;
            --robot-red: #ff003c;
            --robot-size: 45px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            padding: 90px 20px 50px; 
            color: #fff;
            overflow-x: hidden; 
            position: relative;
            font-family: 'Tajawal', sans-serif;
            /* منع تحديد النصوص للحماية */
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- 1. Background Effects --- */
        #rainCanvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
        }

        .lightning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(200, 0, 255, 0.15); opacity: 0;
            pointer-events: none; z-index: 9998; transition: opacity 0.1s;
        }

        /* --- 2. Corner Icons --- */
        .bg-icon {
            position: absolute; z-index: 150; 
            width: 120px; pointer-events: none;
            opacity: 0; 
        }
        .bg-ae { 
            top: 20px; right: 20px; filter: drop-shadow(0 0 25px var(--neon-purple)); 
            animation: fadeInIcon 1s ease forwards 1s, float 6s infinite 2s;
        }
        .bg-am { 
            bottom: 85px; left: 20px; border-radius: 50%; filter: drop-shadow(0 0 25px var(--neon-green-dark)); 
            animation: fadeInIcon 1s ease forwards 1s, float-rev 7s infinite 2s;
        }
        
        @keyframes fadeInIcon { to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes float-rev { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(15px); } }

        /* --- 3. Main Glass Container --- */
        .container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.02) 0%, rgba(15, 5, 25, 0.2) 100%);
            backdrop-filter: blur(8px) saturate(120%); -webkit-backdrop-filter: blur(8px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 50px 30px;
            width: 100%; max-width: 440px; text-align: center;
            position: relative; z-index: 100;
            box-shadow: 0 0 40px rgba(157, 0, 255, 0.1), inset 0 0 10px rgba(255, 255, 255, 0.05);
            overflow: hidden; margin: 0 auto; 
            opacity: 0; transform: scale(0.95);
            animation: containerReveal 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes containerReveal { to { opacity: 1; transform: scale(1); } }

        #innerBouncingCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
        }

        /* --- 4. Premium Staggered Entrance Animation --- */
        .logo-container, .title-container, .crystal-panel, .link-btn, .visitor-badge-container { 
            position: relative; z-index: 10; opacity: 0; 
            animation: fadeInUpBlur 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes fadeInUpBlur {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .logo-container { animation-delay: 0.2s; }
        .title-container { animation-delay: 0.4s; }
        .crystal-panel { animation-delay: 0.6s; }
        .link-btn:nth-child(1) { animation-delay: 0.8s; } 
        .link-btn:nth-child(2) { animation-delay: 0.95s; } 
        .link-btn:nth-child(3) { animation-delay: 1.1s; } 
        .link-btn:nth-child(4) { animation-delay: 1.25s; } 
        .visitor-badge-container { animation-delay: 1.5s; }

        /* --- 5. Logo, VORTX Title Glow & Glitch --- */
        .logo-container {
            width: 140px; height: 140px; margin: 0 auto 15px; border-radius: 50%; padding: 4px;
            background: var(--neon-purple); box-shadow: 0 0 25px var(--neon-purple);
        }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #05000a; }

        .title-container { margin: 15px auto 5px; }
        .title-img { 
            width: 85%; max-width: 250px; display: block; margin: 0 auto; 
            filter: drop-shadow(0 0 25px rgba(157, 0, 255, 0.9)); 
        }
        .glitch { animation: glitch 5s infinite; } 
        
        @keyframes glitch { 
            0%, 92%, 100% { filter: drop-shadow(0 0 25px rgba(157, 0, 255, 0.9)); transform: translate(0); } 
            94% { filter: drop-shadow(0 0 25px rgba(157, 0, 255, 0.9)) brightness(1.8) hue-rotate(20deg); transform: translate(2px, -2px); } 
            96% { filter: drop-shadow(0 0 25px rgba(157, 0, 255, 0.9)) contrast(2); transform: translate(-2px, 2px); } 
        }

        /* --- 6. Premium Crystal Glass Panel --- */
        .crystal-panel {
            margin: 5px auto 30px; padding: 12px 25px; background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 12px; overflow: hidden; display: inline-block; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .crystal-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 12px; padding: 1px;
            background: linear-gradient(135deg, var(--neon-purple), transparent, rgba(0, 243, 255, 0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
        }
        .crystal-panel::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: glassShimmer 4s infinite; pointer-events: none;
        }
        @keyframes glassShimmer { 0% { left: -150%; } 20%, 100% { left: 150%; } }
        
        .crystal-text {
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #9aa0a6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 3px rgba(0, 0, 0, 0.8)); position: relative; z-index: 2;
        }

        /* --- 7. Buttons --- */
        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #fff; background: rgba(0, 0, 0, 0.5);
            padding: 18px; border-radius: 15px; font-size: 17px; font-weight: 700;
            border: 1px solid rgba(157, 0, 255, 0.3); transition: all 0.3s ease;
            -webkit-user-drag: none;
        }
        .link-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #b400ff, 0 0 30px #7a00ff; border-color: var(--neon-purple); }
        .link-btn:active { transform: scale(0.95) !important; box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 0 5px var(--neon-purple) !important; }

        .store-btn { background: linear-gradient(90deg, #4a00e0, #8e2de2); border: 1px solid rgba(255, 255, 255, 0.3); position: relative; overflow: hidden; box-shadow: 0 0 15px rgba(157, 0, 255, 0.3), inset 0 2px 4px rgba(255, 255, 255, 0.3); }
        .store-btn::after { content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%); transform: skewX(-25deg); animation: storeBtnShine 3s infinite; pointer-events: none; }
        @keyframes storeBtnShine { 0% { left: -150%; } 20%, 100% { left: 150%; } }

        .btn-icon { width: 44px; height: 44px; margin-right: 12px; object-fit: contain; pointer-events: none;}
        .btn-icon-telegram { transform: scale(1.3); }
        
        /* التعديل: تقليل نسبة التكبير للانستقرام لتتناسق مع البقية أكثر */
        .btn-icon-instagram { transform: scale(1.10); } 
        
        .glow-tiktok { filter: drop-shadow(0 0 8px rgba(220, 220, 220, 0.9)); }
        .glow-telegram { filter: drop-shadow(0 0 8px #00f3ff); }
        .glow-instagram { filter: drop-shadow(0 0 8px #ff007f); }

        .btn-blue-reaction { background: rgba(0, 243, 255, 0.2) !important; box-shadow: 0 0 20px #00f3ff, 0 0 40px #00f3ff !important; border-color: #00f3ff !important; transform: scale(1.05) !important; }

        /* --- 8. Glass Visitor Badge --- */
        .visitor-badge-container { margin-top: 35px; display: flex; justify-content: center; }
        .visitor-badge { display: inline-flex; align-items: center; padding: 10px 25px; font-size: 14px; color: rgba(255, 255, 255, 0.8); background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2), inset 0 0 10px rgba(255, 255, 255, 0.05); letter-spacing: 1px; }
        .visitor-badge span { color: #d866ff; font-weight: 900; margin-left: 5px; text-shadow: 0 0 8px rgba(216, 102, 255, 0.6); font-size: 15px; }

        /* --- 9. Cyber Robot CSS --- */
        /* التعديل: حساب المسافة بحيث يجلس الروبوت بالملي على المستطيل */
        .robot-wrapper { position: absolute; top: 45px; left: 50%; margin-left: -22.5px; width: var(--robot-size); height: var(--robot-size); z-index: 9999; touch-action: none; cursor: grab; opacity: 0; animation: fadeInIcon 1s ease forwards 0.5s; }
        .robot-wrapper:active { cursor: grabbing; }
        .robot-mesh { position: relative; width: 100%; height: 100%; animation: robotIdle 3s ease-in-out infinite; }
        .robot-body { width: 100%; height: 80%; background: linear-gradient(135deg, #2b004a, var(--robot-color)); border-radius: 12px 12px 8px 8px; position: relative; box-shadow: 0 0 15px var(--robot-color); border: 1px solid rgba(255, 255, 255, 0.3); transition: background 0.3s, box-shadow 0.3s; }
        .eyes-container { display: flex; justify-content: space-between; width: 22px; position: absolute; top: 30%; left: 50%; transform: translateX(-50%); }
        .robot-eye { width: 6px; height: 6px; background: #00f3ff; border-radius: 50%; box-shadow: 0 0 8px #00f3ff; animation: blink 4s infinite; }
        .robot-mouth { width: 14px; height: 6px; position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); border-bottom: 2px solid #00f3ff; border-radius: 0 0 10px 10px; box-shadow: 0 2px 5px rgba(0, 243, 255, 0.5); animation: mouthExpressions 12s infinite; }
        .robot-propeller { width: 60%; height: 4px; background: rgba(255, 255, 255, 0.8); position: absolute; top: -6px; left: 50%; transform: translateX(-50%); border-radius: 2px; animation: spinBlade 0.1s linear infinite; }
        .light-beam { position: absolute; top: 50%; left: 22px; height: 35px; background: linear-gradient(to right, rgba(0, 243, 255, 0.8), rgba(0, 243, 255, 0)); transform-origin: left center; opacity: 0; pointer-events: none; transition: opacity 0.3s; clip-path: polygon(0 40%, 100% 0, 100% 100%, 0 60%); z-index: -1; }
        @keyframes robotIdle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes spinBlade { 0% { transform: translateX(-50%) rotateY(0deg); } 100% { transform: translateX(-50%) rotateY(360deg); } }
        @keyframes blink { 0%, 96%, 98% { transform: scaleY(1); } 97% { transform: scaleY(0.1); } }
        @keyframes mouthExpressions { 0%, 40% { border-bottom: 2px solid #00f3ff; border-top: none; border-radius: 0 0 10px 10px; height: 6px; } 45%, 55% { border-bottom: 2px solid #00f3ff; border-top: none; border-radius: 0; height: 0px; box-shadow: 0 0 5px #00f3ff;} 60%, 90% { border-top: 2px solid #00f3ff; border-bottom: none; border-radius: 10px 10px 0 0; height: 6px; } 95%, 100% { border-bottom: 2px solid #00f3ff; border-top: none; border-radius: 0 0 10px 10px; height: 6px; } }
        .robot-spin { animation: quickSpin 0.5s ease-out !important; }
        @keyframes quickSpin { 0% { transform: rotate(0deg) scale(1.2); } 100% { transform: rotate(360deg) scale(1); } }
        .robot-shake { animation: shakeDust 0.6s ease-in-out !important; }
        @keyframes shakeDust { 0%, 100% { transform: translateX(0) rotate(0); } 20%, 60% { transform: translateX(-5px) rotate(-10deg); } 40%, 80% { transform: translateX(5px) rotate(10deg); } }
        .robot-red-theme .robot-body { background: linear-gradient(135deg, #4a0000, var(--robot-red)); box-shadow: 0 0 20px var(--robot-red); }
    </style>
</head>
<body>

    <canvas id="rainCanvas"></canvas>
    <div class="lightning" id="flash"></div>

    <img src="ae.png" alt="AE" class="bg-icon bg-ae">
    <img src="am.png" alt="AM" class="bg-icon bg-am">

    <div id="cyber-robot" class="robot-wrapper">
        <div class="robot-mesh">
            <div class="robot-body">
                <div class="eyes-container"><div class="robot-eye"></div><div class="robot-eye"></div></div>
                <div class="robot-mouth"></div>
            </div>
            <div class="robot-propeller"></div>
            <div id="robot-laser" class="light-beam"></div>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <canvas id="innerBouncingCanvas"></canvas>

        <div class="logo-container"><img src="lg.png" alt="Avatar" class="logo"></div>
        
        <div class="title-container">
            <img src="vr.png" alt="VORTX" class="title-img glitch">
        </div>
        
        <div class="crystal-panel"><span class="crystal-text">Master Your Motion</span></div>

        <div class="links-wrapper">
            <a href="#" class="link-btn store-btn">🛒 Online Store</a>
            <a href="https://www.tiktok.com/@ortr.1?_r=1&_t=ZS-94WfLhF9TMt" target="_blank" class="link-btn"><img src="tik.png" alt="TikTok" class="btn-icon glow-tiktok"> TikTok</a>
            <a href="https://t.me/popo_jo" target="_blank" class="link-btn" id="telegram-btn"><img src="tly.png" alt="Telegram" class="btn-icon btn-icon-telegram glow-telegram"> Telegram</a>
            <a href="https://www.instagram.com/toix.8i?igsh=Z3B1eWdwNGJocW9q" target="_blank" class="link-btn"><img src="ins.png" alt="Instagram" class="btn-icon btn-icon-instagram glow-instagram"> Instagram</a>
        </div>

        <div class="visitor-badge-container">
            <div class="visitor-badge">👁 Visitors: <span id="vCount">0</span></div>
        </div>
    </div>

    <script>
        // --- Anti-Theft Security ---
        document.addEventListener('contextmenu', event => event.preventDefault()); 
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
        }

        // --- 1. Rain Background ---
        const rainCanvas = document.getElementById('rainCanvas');
        const ctxRain = rainCanvas.getContext('2d');
        function resizeRain() { rainCanvas.width = window.innerWidth; rainCanvas.height = window.innerHeight; }
        resizeRain();
        const rainParticles = [];
        for (let i = 0; i < 60; i++) {
            rainParticles.push({ x: Math.random() * rainCanvas.width, y: Math.random() * rainCanvas.height, size: Math.random() * 2, speedY: Math.random() * 0.4 + 0.1, opacity: Math.random() * 0.5 + 0.1 });
        }
        function animateRain() {
            ctxRain.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
            rainParticles.forEach(p => {
                ctxRain.fillStyle = `rgba(157, 0, 255, ${p.opacity})`; ctxRain.beginPath(); ctxRain.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctxRain.fill();
                p.y += p.speedY; if (p.y > rainCanvas.height) { p.y = 0; p.x = Math.random() * rainCanvas.width; }
            }); requestAnimationFrame(animateRain);
        } animateRain();

        // --- 2. Bouncing Lines ---
        const innerCanvas = document.getElementById('innerBouncingCanvas');
        const ctxInner = innerCanvas.getContext('2d');
        const container = document.getElementById('mainContainer');
        let innerW, innerH;
        function resizeInnerCanvas() { innerW = container.offsetWidth; innerH = container.offsetHeight; innerCanvas.width = innerW; innerCanvas.height = innerH; }
        const linesParticles = [];
        for(let i=0; i<20; i++) { linesParticles.push({ x: Math.random() * 300, y: Math.random() * 300, vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5 }); }
        function animateInnerLines() {
            ctxInner.clearRect(0, 0, innerW, innerH);
            for(let i=0; i<linesParticles.length; i++) {
                let p = linesParticles[i]; p.x += p.vx; p.y += p.vy;
                if(p.x <= 0 || p.x >= innerW) p.vx *= -1; if(p.y <= 0 || p.y >= innerH) p.vy *= -1;
            }
            ctxInner.lineWidth = 1;
            for(let i=0; i<linesParticles.length; i++) {
                for(let j=i+1; j<linesParticles.length; j++) {
                    let dx = linesParticles[i].x - linesParticles[j].x; let dy = linesParticles[i].y - linesParticles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 80) { ctxInner.beginPath(); ctxInner.strokeStyle = `rgba(157, 0, 255, ${1 - dist/80})`; ctxInner.moveTo(linesParticles[i].x, linesParticles[i].y); ctxInner.lineTo(linesParticles[j].x, linesParticles[j].y); ctxInner.stroke(); }
                }
            } requestAnimationFrame(animateInnerLines);
        }
        window.addEventListener('resize', () => { resizeRain(); resizeInnerCanvas(); });
        setTimeout(() => { resizeInnerCanvas(); animateInnerLines(); }, 100);

        // --- 3. REAL Global Visitor Counter ---
        const counterNamespace = "vortx_official_page"; 
        const counterKey = "total_visits";

        fetch(`https://api.counterapi.dev/v1/${counterNamespace}/${counterKey}/up`)
          .then(response => response.json())
          .then(data => {
              document.getElementById('vCount').innerText = data.count.toLocaleString();
          })
          .catch(error => {
              console.error("Error fetching counter");
          });

        const flash = document.getElementById('flash');
        document.addEventListener('click', (e) => {
            if (e.target.closest('#cyber-robot') || e.target.closest('.link-btn')) return;
            flash.style.opacity = '1'; setTimeout(() => { flash.style.opacity = '0'; }, 100);
        });

        document.addEventListener("mousemove", e => {
            const x = (window.innerWidth / 2 - e.clientX) / 60; const y = (window.innerHeight / 2 - e.clientY) / 60;
            document.body.style.transform = `translate(${x}px, ${y}px)`;
        });

        // --- 4. Cyber Robot Logic ---
        const robot = document.getElementById('cyber-robot');
        const robotMesh = document.querySelector('.robot-mesh');
        const laser = document.getElementById('robot-laser');
        const telegramBtn = document.getElementById('telegram-btn');
        let isDragging = false;
        let xOffset = 0, yOffset = 0;

        setTimeout(() => {
            if(!telegramBtn) return;
            const targetRect = telegramBtn.getBoundingClientRect();
            const robotRect = robot.getBoundingClientRect();
            const moveX = targetRect.left - robotRect.left - 80; 
            const moveY = targetRect.top - robotRect.top + 10;
            
            robot.style.transition = 'transform 1.5s ease-in-out';
            robot.style.transform = `translate(${moveX}px, ${moveY}px)`;
            
            xOffset = moveX; yOffset = moveY;
            
            setTimeout(() => {
                const currentRect = robot.getBoundingClientRect();
                const dx = targetRect.left - (currentRect.left + 45); 
                const dy = (targetRect.top + targetRect.height/2) - (currentRect.top + 22);
                const distance = Math.sqrt(dx*dx + dy*dy);
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                
                laser.style.width = `${distance}px`;
                laser.style.transform = `rotate(${angle}deg)`;
                laser.style.opacity = '1';
                telegramBtn.classList.add('btn-blue-reaction');
                
                setTimeout(() => {
                    laser.style.opacity = '0';
                    telegramBtn.classList.remove('btn-blue-reaction');
                    
                    robot.style.transform = `translate(0px, 0px)`;
                    xOffset = 0; yOffset = 0;
                }, 2000); 
            }, 1500); 
        }, 1800);

        let initialX, initialY;

        robot.addEventListener('touchstart', (e) => {
            if(isDragging) return;
            e.stopPropagation(); 
            
            robotMesh.classList.remove('robot-shake');
            robotMesh.classList.add('robot-spin', 'robot-red-theme');
            setTimeout(() => { robotMesh.classList.remove('robot-spin', 'robot-red-theme'); }, 500);
            
            initialX = e.touches[0].pageX - xOffset;
            initialY = e.touches[0].pageY - yOffset;
            robot.style.transition = 'none';
        });

        robot.addEventListener('touchmove', (e) => {
            isDragging = true; e.preventDefault();
            const currentX = e.touches[0].pageX - initialX;
            const currentY = e.touches[0].pageY - initialY;
            xOffset = currentX; yOffset = currentY;
            robot.style.transform = `translate(${currentX}px, ${currentY}px)`;
        }, { passive: false });

        robot.addEventListener('touchend', () => {
            if(isDragging) {
                robotMesh.classList.add('robot-shake');
                setTimeout(() => { robotMesh.classList.remove('robot-shake'); }, 600);
                isDragging = false;
            }
        });
    </script>
</body>
</html>
